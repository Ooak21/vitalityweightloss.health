async function api(payload){
  const a = payload || {};
  if (USE_CONVEX) {
    if (a.action === 'load')       return await convex.query('portal:loadPortal', {});
    if (a.action === 'add_log')    return await convex.mutation('portal:addLog', { kind:a.kind, value_num:a.value_num, unit:a.unit, body:a.body });
    if (a.action === 'mint_token') return await convex.mutation('portal:mintToken', {});
    return { ok:false, error:'unknown action' };
  }
  const r=await fetch(FN,{method:'POST',headers:{'Content-Type':'application/json','apikey':ANON,'Authorization':'Bearer '+TOKEN},body:JSON.stringify(payload||{})}); return await r.json();
}

function gamify(){
  const PTS={food:10,weigh_in:5,journal:5,activity:15,scan:10,module:25,nextstep:20};
  const logs=DATA.logs||[], ib=DATA.inbody||[], plan=DATA.plan, h=plan&&plan.handbook;
  const dk=(iso)=>new Date(iso).toDateString();
  let points=0; const dates=new Set();
  logs.forEach(l=>{ points+=PTS[l.kind]||5; dates.add(dk(l.logged_at)); });
  let streak=0, cur=new Date(); if(!dates.has(cur.toDateString())) cur.setDate(cur.getDate()-1);
  while(dates.has(cur.toDateString())){ streak++; cur.setDate(cur.getDate()-1); }
  const days14=[]; for(let i=13;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); days14.push({label:d.toLocaleDateString('en-US',{weekday:'narrow'}), active:dates.has(d.toDateString())}); }
  const week=days14.slice(7).filter(d=>d.active).length;
  const start=(h&&h.summary&&h.summary.weight)||(ib[0]&&+ib[0].weight_lb)||null;
  const goal=(plan&&plan.goal_weight)||(h&&h.summary&&h.summary.goal_weight)||null;
  const wl=logs.filter(l=>l.kind==='weigh_in'&&l.value_num!=null);
  const cw=wl.length?+wl[0].value_num:(ib.length?+ib[ib.length-1].weight_lb:start);
  const lost=(start!=null&&cw!=null)?(start-cw):0, n=logs.length;
  const doneMods=new Set(logs.filter(l=>l.kind==='module').map(l=>(l.body||'').split(':')[0].trim())).size;
  const doneNext=new Set(logs.filter(l=>l.kind==='nextstep').map(l=>(l.body||'').split(':')[0].trim())).size;
  const B=(i,l,d,e)=>({icon:i,label:l,desc:d,earned:!!e});
  const badges=[
    B('👣','First step','Log your first anything',n>=1),
    B('⚖️','First weigh-in','Log a weight',logs.some(l=>l.kind==='weigh_in')),
    B('🍽️','Food logged','Log a meal or food',logs.some(l=>l.kind==='food')),
    B('🔥','3-day streak','Log 3 days in a row',streak>=3),
    B('🗓️','Week warrior','Log 7 days in a row',streak>=7),
    B('📉','Down 5 lb','Drop 5 lb from start',lost>=5),
    B('💪','Down 10 lb','Drop 10 lb from start',lost>=10),
    B('⭐','50 logs','Log 50 entries total',n>=50),
    B('🚀','Off the ground','Finish a Next Step',doneNext>=1),
    B('🎉','All set','Finish all 5 Next Steps',doneNext>=5),
    B('🎓','PhD scholar','Finish 3 lessons',doneMods>=3),
    B('🏆','Goal reached','Hit your goal weight',goal!=null&&cw!=null&&cw<=goal),
  ];
  return {points,streak,week,days14,lost:Math.max(0,Math.round(lost*10)/10),badges,earned:badges.filter(b=>b.earned).length};
}

function doneSlugs(){ const s=new Set(); (DATA.logs||[]).filter(l=>l.kind==='module').forEach(l=>{ const sl=(l.body||'').split(':')[0].trim(); if(sl) s.add(sl); }); return s; }

function openModule(slug){
  const m=MODULES.find(x=>x.slug===slug); if(!m) return;
  $('modTitle').textContent=m.title;
  const lessons=m.lessons.map(L=>`<div class="mb-4"><div class="font-semibold text-sm mb-1">${esc(L.heading)}</div><p class="text-sm text-[#4b5563] leading-relaxed">${esc(L.body)}</p></div>`).join('');
  const quiz=m.quiz.map((q,qi)=>`<div class="mb-4"><div class="text-sm font-semibold mb-2">${qi+1}. ${esc(q.q)}</div>${q.options.map((o,oi)=>`<label class="flex items-center gap-2 py-1.5 px-2 rounded-lg hover:bg-[#f7f8fa] cursor-pointer"><input type="radio" name="q${qi}" value="${oi}" class="accent-[#0a6cf5]"><span class="text-sm">${esc(o)}</span></label>`).join('')}</div>`).join('');
  $('modBody').innerHTML=`<div class="mb-5">${lessons}</div><div class="border-t border-[#eef0f4] pt-4"><div class="text-[11px] uppercase tracking-wide text-[#0a6cf5] font-semibold mb-3">Quick check</div>${quiz}<div id="modResult" class="text-sm mb-3"></div><button id="modSubmit" class="w-full py-2.5 rounded-xl bg-[#0a6cf5] text-white font-semibold">Submit</button></div>`;
  $('modModal').classList.remove('hidden'); $('modModal').classList.add('flex');
  $('modBody').scrollTop=0;
  $('modSubmit').onclick=()=>submitQuiz(m);
}
function closeMod(){ $('modModal').classList.add('hidden'); $('modModal').classList.remove('flex'); }
async function submitQuiz(m){
  let correct=0, answered=0;
  m.quiz.forEach((q,qi)=>{ const sel=document.querySelector(`input[name="q${qi}"]:checked`); if(sel){ answered++; if(+sel.value===q.answer) correct++; } });
  if(answered<m.quiz.length){ $('modResult').innerHTML='<span class="text-amber-600">Answer every question to finish.</span>'; return; }
  const pct=Math.round(correct/m.quiz.length*100);
  if(correct>=Math.ceil(m.quiz.length*0.67)){
    $('modResult').innerHTML=`<span class="text-emerald-600 font-semibold">Nice, ${correct}/${m.quiz.length} correct. +25 points.</span>`;
    const btn=$('modSubmit'); btn.disabled=true; btn.textContent='Completed ✓';
    await api({action:'add_log',kind:'module',value_num:pct,body:`${m.slug}: ${m.title}`});
    DATA=await api({action:'load'});
    setTimeout(()=>{ closeMod(); render(); }, 1100);
  } else {
    $('modResult').innerHTML=`<span class="text-rose-600">${correct}/${m.quiz.length} correct. Review the lesson and try again.</span>`;
  }
}

      <div class="flex items-center justify-between mb-4"><h2 class="font-display text-lg font-semibold">Badges</h2><span class="text-xs text-[#9aa0ab]">${g.earned}/${g.badges.length} earned</span></div>
      <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
        ${g.badges.map(b=>`<div class="rounded-xl border p-3 ${b.earned?'bg-white border-[#e6e9ee]':'bg-[#f7f8fa] border-[#eef0f4] opacity-50'}"><div class="flex items-center gap-2"><div class="text-2xl leading-none">${b.icon}</div><div class="min-w-0"><div class="text-sm font-semibold ${b.earned?'text-[#16201d]':'text-[#9aa0ab]'}">${esc(b.label)}</div></div></div><div class="text-[11px] text-[#9aa0ab] mt-1.5">${esc(b.desc)}</div></div>`).join('')}
      </div>
    </section>

    <section class="card p-6">
      <h2 class="font-display text-lg font-semibold mb-1">How you earn points</h2>
      <div class="grid grid-cols-3 sm:grid-cols-5 gap-2 mt-3 text-center">
        <div class="rounded-xl bg-[#f7f8fa] border border-[#eef0f4] p-3"><div class="font-display text-lg font-semibold">+10</div><div class="text-[11px] text-[#6b7280]">log a food</div></div>
        <div class="rounded-xl bg-[#f7f8fa] border border-[#eef0f4] p-3"><div class="font-display text-lg font-semibold">+5</div><div class="text-[11px] text-[#6b7280]">weigh-in</div></div>
        <div class="rounded-xl bg-[#f7f8fa] border border-[#eef0f4] p-3"><div class="font-display text-lg font-semibold">+5</div><div class="text-[11px] text-[#6b7280]">journal note</div></div>
        <div class="rounded-xl bg-[#f7f8fa] border border-[#eef0f4] p-3"><div class="font-display text-lg font-semibold">+15</div><div class="text-[11px] text-[#6b7280]">log activity</div></div>
        <div class="rounded-xl bg-[#f3f7ff] border border-[#d6e6ff] p-3"><div class="font-display text-lg font-semibold text-[#0a6cf5]">+25</div><div class="text-[11px] text-[#6b7280]">finish a lesson</div></div>
      </div>
    </section>

    <section class="card p-6 bg-gradient-to-br from-white to-[#f3f7ff]">
      <div class="flex items-center justify-between mb-1"><div class="flex items-center gap-2"><span class="text-xl">🎓</span><h2 class="font-display text-lg font-semibold">PhD: Personal Health Education</h2></div><span class="text-xs text-[#9aa0ab]">${done.size}/${MODULES.length} done</span></div>
      <p class="text-sm text-[#6b7280] mb-4">Short lessons that unlock as you go, with a quick quiz to lock in what you learn. Each one is worth 25 points.</p>
      <div class="grid sm:grid-cols-2 gap-3">${MODULES.map((m,i)=>{const isDone=done.has(m.slug),unlocked=(i===0||done.has(MODULES[i-1].slug));return `<button ${unlocked?'':'disabled'} data-mod="${m.slug}" class="text-left rounded-xl border p-3 transition ${isDone?'bg-[#eafaf0] border-[#cdeedd]':unlocked?'bg-white border-[#e6e9ee] hover:border-[#0a6cf5]':'bg-[#f7f8fa] border-[#eef0f4] opacity-60 cursor-not-allowed'}"><div class="flex items-center gap-2"><span class="text-xl">${m.icon}</span><span class="text-sm font-semibold">${esc(m.title)}</span></div><div class="text-[11px] mt-1 ${isDone?'text-[#0a7a3d] font-semibold':'text-[#9aa0ab]'}">${isDone?'✓ Completed':unlocked?'Start →':'Locked · finish the previous one'}</div></button>`;}).join('')}</div>
      <p class="text-[11px] text-[#9aa0ab] mt-3">This program is informational and supports, but does not replace, the guidance of your care team.</p>
    </section>`;
}

// module viewer listeners
$('modClose').onclick=closeMod;
$('modModal').addEventListener('click',(e)=>{ if(e.target===$('modModal')) closeMod(); });
document.addEventListener('click',(e)=>{ const b=e.target.closest&&e.target.closest('[data-mod]'); if(b&&!b.disabled) openModule(b.getAttribute('data-mod')); });
document.addEventListener('click',(e)=>{ const b=e.target.closest&&e.target.closest('[data-nextstep]'); if(b&&!b.disabled) openNextStep(b.getAttribute('data-nextstep')); });

DATA = await api({action:'load'});
$('loading').classList.add('hidden');
if (!DATA || !DATA.ok || !DATA.patient){ $('loading').textContent='Could not load your rewards. Please head back and try again.'; $('loading').classList.remove('hidden'); }
else { $('content').classList.remove('hidden'); render(); }
</script>
</body>
</html>
