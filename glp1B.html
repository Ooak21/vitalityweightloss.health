<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Vitality GLP-1 Program</title>
<meta name="description" content="Personalized GLP-1 prescription reviewed by Dr. DeBry, MD within 24 hours. Compounded by a USA-licensed 503A pharmacy. Vitality Weight Loss.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#16201d;
    --navy-2:#334155;
    --ink:#16201d;
    --muted:#6b7280;
    --line:#e6e9ee;
    --line-2:#eef0f4;
    --cream:#ffffff;
    --cream-2:#f7f8fa;
    --bone:#ffffff;
    --white:#ffffff;
    --green:#0a6cf5;
    --green-deep:#0856c8;
    --green-soft:#bcd6ff;
    --blue:#0a6cf5;
    --accent:#0a6cf5;
    --shadow-1: 0 1px 2px rgba(16,24,40,.06), 0 8px 24px rgba(16,24,40,.06);
    --shadow-2: 0 2px 4px rgba(16,24,40,.08), 0 16px 40px rgba(16,24,40,.10);
    --shadow-lift: 0 1px 0 rgba(16,24,40,.04), 0 2px 4px rgba(16,24,40,.04), 0 10px 30px rgba(16,24,40,.08);
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #ffffff;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    line-height: 1.55;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position: fixed;
    inset: 0;
    background: radial-gradient(60% 50% at 50% 0%, rgba(10,108,245,.07), rgba(10,108,245,0) 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* TOP BAR */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid rgba(16,24,40,.06);
  }
  .topbar-inner {
    max-width: 720px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .brand-logo { height:30px; width:auto; flex-shrink:0; display:block; }
  .brand-name {
    font-family: 'Montserrat','Inter',sans-serif;
    font-weight: 600;
    font-size: 1.18rem;
    color: var(--ink);
    letter-spacing: .15em;
    text-transform: uppercase;
    line-height: 1;
    display: flex; flex-direction: column; align-items: center;
  }
  .brand-name .sub {
    display: block;
    font-family: 'Montserrat','Inter',sans-serif;
    font-weight: 500;
    font-size: .5rem;
    color: var(--ink);
    letter-spacing: .30em;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .trust-pill {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: .04em;
    display: flex; align-items: center; gap: 6px;
  }
  .trust-pill::before {
    content:''; width:6px; height:6px; border-radius:50%;
    background: var(--green); box-shadow: 0 0 0 3px rgba(10,108,245,.18);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity:.6; } 50% { opacity:1; } }

  /* PROGRESS */
  .progress-bar {
    position: fixed; top: 65px; left: 0; right: 0;
    height: 2px;
    background: rgba(16,24,40,.08);
    z-index: 49;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #0856c8 0%, #0a6cf5 35%, #0a6cf5 100%);
    width: 0;
    transition: width .55s cubic-bezier(.65,.05,.36,1);
    box-shadow: 0 0 12px rgba(10,108,245,.5), 0 0 24px rgba(10,108,245,.25);
    position: relative;
  }
  .progress-fill::after {
    content:'';
    position: absolute; top: 0; right: 0; bottom: 0;
    width: 30px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.6));
    animation: progressShimmer 2s linear infinite;
  }
  @keyframes progressShimmer {
    0% { opacity: 0; }
    50% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* MAIN */
  main {
    position: relative;
    z-index: 1;
    max-width: 640px;
    margin: 0 auto;
    padding: 56px 24px 140px;
    min-height: calc(100vh - 64px);
  }
  .screen { animation: enter .55s cubic-bezier(.2,.7,.3,1); }
  @keyframes enter {
    from { opacity:0; transform: translateY(14px); }
    to   { opacity:1; transform: none; }
  }

  /* SECTION TAG */
  .section-tag {
    display: inline-flex; align-items:center; gap:8px;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--green-deep);
    letter-spacing: .16em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  /* TYPOGRAPHY */
  h1 {
    font-family: 'Montserrat','Inter',sans-serif;
    font-weight: 400;
    font-size: clamp(30px, 5vw, 42px);
    line-height: 1.1;
    letter-spacing: -.025em;
    color: var(--navy);
    margin: 0 0 16px;
  }
  h1 em {
    font-style: italic;
    font-weight: 400;
    background: linear-gradient(120deg, #0856c8 0%, #0a6cf5 30%, #0a6cf5 80%, #1f6db3 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    padding-right: .12em;
    background-size: 200% 200%;
    animation: gradientShift 8s ease-in-out infinite;
  }
  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  h2 {
    font-family: 'Montserrat','Inter',sans-serif;
    font-weight: 500;
    font-size: 22px;
    color: var(--navy);
    margin: 32px 0 12px;
    letter-spacing: -.01em;
  }
  .lede {
    font-size: 16.5px;
    color: var(--muted);
    margin: 0 0 32px;
    line-height: 1.55;
    max-width: 540px;
  }

  /* BACK */
  .back-btn {
    background: none; border: 0;
    color: var(--muted);
    font-family: inherit; font-size: 13.5px; font-weight: 500;
    padding: 4px 0;
    cursor: pointer;
    margin-bottom: 18px;
    display: flex; width: fit-content; align-items: center; gap: 6px;
    transition: color .15s;
  }
  .back-btn:hover { color: var(--navy); }
  .back-btn svg { width:14px; height:14px; }

  /* OPTION CHIPS */
  .opt-group { display: flex; flex-direction: column; gap: 10px; margin: 12px 0 24px; }
  .opt {
    appearance:none; background: var(--white);
    border: 1.5px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px;
    text-align: left; cursor: pointer;
    font-family: inherit;
    font-size: 15.5px;
    font-weight: 500;
    color: var(--ink);
    display: flex; align-items: center; gap: 14px;
    transition: all .2s cubic-bezier(.2,.7,.3,1);
    box-shadow: 0 1px 0 rgba(16,24,40,.02);
  }
  .opt:hover {
    border-color: var(--navy);
    transform: translateY(-1px);
    box-shadow: var(--shadow-1);
  }
  .opt .check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    background: var(--cream-2);
    flex-shrink: 0;
    position: relative;
    transition: all .2s;
  }
  .opt.checkbox .check { border-radius: 6px; }
  .opt.selected {
    border-color: var(--navy);
    background: linear-gradient(180deg, var(--bone) 0%, var(--white) 100%);
    box-shadow: 0 0 0 3px rgba(16,24,40,.06), var(--shadow-1);
  }
  .opt.selected .check { border-color: var(--green); background: var(--green); }
  .opt.selected .check::after {
    content:''; position: absolute;
    left: 6px; top: 2px;
    width: 6px; height: 11px;
    border: solid white; border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .opt-body { flex:1; }
  .opt-body small {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 400;
  }

  /* INPUTS */
  .field { display: block; margin-bottom: 14px; }
  .field .lab {
    display:block;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .12em;
    margin-bottom: 8px;
  }
  input[type="text"], input[type="email"], input[type="tel"],
  input[type="number"], input[type="date"], textarea, select {
    width: 100%;
    background: var(--white);
    border: 1.5px solid var(--line);
    border-radius: 12px;
    padding: 16px 18px;
    font-family: inherit;
    font-size: 16px;
    color: var(--ink);
    transition: all .18s;
    -webkit-appearance: none;
    box-shadow: 0 1px 0 rgba(16,24,40,.02);
  }
  textarea { resize: vertical; min-height: 100px; line-height: 1.5; }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--navy);
    box-shadow: 0 0 0 4px rgba(16,24,40,.08);
  }
  input::placeholder, textarea::placeholder { color: #b2b8c2; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* CTA */
  .cta {
    display: inline-flex; align-items:center; justify-content:center; gap: 10px;
    background: var(--navy);
    color: var(--white);
    font-family: inherit;
    font-weight: 600;
    font-size: 15.5px;
    padding: 17px 28px;
    border-radius: 999px;
    border: 0;
    cursor: pointer;
    text-decoration: none;
    transition: all .22s cubic-bezier(.2,.7,.3,1);
    margin-top: 20px;
    box-shadow: 0 1px 2px rgba(16,24,40,.2), 0 6px 18px rgba(16,24,40,.16);
    min-width: 220px;
    letter-spacing: -.005em;
  }
  .cta:hover:not(:disabled) {
    background: var(--navy-2);
    transform: translateY(-1px);
    box-shadow: 0 1px 2px rgba(16,24,40,.2), 0 12px 28px rgba(16,24,40,.22);
  }
  .cta:disabled { opacity: .35; cursor: not-allowed; box-shadow: none; }
  .cta-green {
    background: linear-gradient(135deg, #4ab33d 0%, #0a6cf5 35%, #0856c8 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.2),
      0 1px 2px rgba(8,86,200,.3),
      0 10px 28px rgba(8,86,200,.32);
    position: relative;
    overflow: hidden;
  }
  .cta-green::before {
    content:'';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,.18) 0%, transparent 50%);
    pointer-events: none;
  }
  .cta-green:hover:not(:disabled) {
    background: linear-gradient(135deg, #0a6cf5 0%, #0856c8 50%, #1f5a1a 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.2),
      0 1px 2px rgba(8,86,200,.3),
      0 16px 36px rgba(8,86,200,.4);
  }
  /* default navy CTA also gets a deeper gradient */
  .cta:not(.cta-green) {
    background: linear-gradient(135deg, #334155 0%, #16201d 100%);
  }
  .cta svg { width: 16px; height: 16px; }

  /* HERO */
  .hero { text-align: center; padding-top: 24px; }
  .hero-logo {
    width: auto; height: 84px; display:block;
    margin: 0 auto 28px;
    animation: floaty 4s ease-in-out infinite;
  }
  @keyframes floaty {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .hero h1 {
    font-size: clamp(36px, 6vw, 56px);
    margin-bottom: 18px;
  }
  .hero .lede {
    margin-left: auto; margin-right: auto;
    font-size: 17px;
    max-width: 460px;
  }
  .hero-stat {
    display: inline-block;
    margin: 24px auto 8px;
    padding: 22px 32px;
    background: linear-gradient(180deg, #ffffff 0%, #fdfaf3 100%);
    border-radius: 20px;
    box-shadow: var(--shadow-lift);
    position: relative;
    isolation: isolate;
  }
  .hero-stat::before {
    content:'';
    position: absolute; inset: 0;
    border-radius: 20px;
    padding: 1.5px;
    background: linear-gradient(135deg, rgba(10,108,245,.7) 0%, rgba(10,108,245,.5) 50%, rgba(10,108,245,.6) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
    z-index: -1;
  }
  .hero-stat .big {
    background: linear-gradient(135deg, #16201d 0%, #0856c8 70%, #0a6cf5 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }
  .hero-stat .big {
    font-family: 'Montserrat','Inter',sans-serif;
    font-size: 44px;
    font-weight: 500;
    color: var(--navy);
    letter-spacing: -.025em;
    line-height: 1;
    display: block;
  }
  .hero-stat .lbl {
    font-size: 11.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .14em;
    margin-top: 6px;
    font-weight: 600;
  }

  /* TRUST */
  .trust-row {
    display: flex; flex-wrap: wrap; gap: 14px 24px;
    justify-content: center;
    margin: 36px 0 10px;
    font-size: 12.5px;
    color: var(--muted);
    font-weight: 500;
  }
  .trust-row span { display: flex; align-items: center; gap: 6px; }
  .trust-row svg { width: 14px; height: 14px; color: var(--green-deep); }

  /* INFO */
  .info {
    background: var(--white);
    border: 1px solid var(--line);
    border-left: 3px solid var(--blue);
    border-radius: 14px;
    padding: 16px 18px;
    font-size: 14px;
    color: var(--ink);
    margin: 22px 0;
    line-height: 1.55;
  }
  .info.warn { border-left-color: var(--accent); background: linear-gradient(180deg, #fdfaf3 0%, var(--white) 100%); }
  .info strong { color: var(--navy); }

  /* DRUG CARDS */
  .drug-cards { display:flex; flex-direction:column; gap: 14px; margin: 18px 0 12px; }
  .drug-card {
    background: var(--white);
    border: 1.5px solid var(--line);
    border-radius: 18px;
    padding: 22px 22px 20px;
    cursor: pointer;
    transition: all .25s cubic-bezier(.2,.7,.3,1);
    position: relative;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(16,24,40,.02);
  }
  .drug-card:hover {
    border-color: var(--navy);
    transform: translateY(-2px);
    box-shadow: var(--shadow-2);
  }
  .drug-card.selected {
    border-color: var(--green);
    background:
      radial-gradient(ellipse at top right, rgba(10,108,245,.08) 0%, transparent 50%),
      radial-gradient(ellipse at bottom left, rgba(10,108,245,.10) 0%, transparent 50%),
      linear-gradient(180deg, #f4faec 0%, #ffffff 60%);
    box-shadow: 0 0 0 3px rgba(10,108,245,.18), var(--shadow-2);
  }
  .drug-card .pill {
    background: linear-gradient(135deg, #fef6e4 0%, #fdebc9 100%);
    color: var(--navy);
    box-shadow: 0 1px 2px rgba(10,108,245,.25);
  }
  .drug-card h3 {
    font-family: 'Montserrat','Inter',sans-serif;
    font-weight: 500;
    font-size: 22px;
    color: var(--navy);
    margin: 0 0 6px;
    letter-spacing: -.015em;
  }
  .drug-card .from {
    font-size: 13px;
    color: var(--green-deep);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .drug-card .body {
    font-size: 14.5px;
    color: var(--ink);
    margin-bottom: 12px;
    line-height: 1.55;
  }
  .drug-card .disc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    padding-top: 12px;
    border-top: 1px solid var(--line-2);
  }
  .drug-card .pill {
    position: absolute; top: 16px; right: 16px;
    font-size: 10px; font-weight: 700;
    background: var(--cream); color: var(--navy);
    padding: 5px 10px; border-radius: 99px;
    letter-spacing: .08em; text-transform: uppercase;
  }

  /* CONSENT */
  /* CONSENT CARD column layout: header banner on top, body row below */
  .ack-card {
    display: flex; flex-direction: column; gap: 0;
    background: var(--white);
    border: 1.5px solid var(--line);
    border-radius: 16px;
    margin-bottom: 14px;
    transition: all .22s cubic-bezier(.2,.7,.3,1);
    overflow: hidden;
  }
  .ack-card:hover { border-color: var(--navy); box-shadow: 0 1px 0 rgba(16,24,40,.04), 0 6px 18px rgba(16,24,40,.06); }
  .ack-card.checked {
    border-color: var(--green);
    background: linear-gradient(180deg, #f4faec 0%, var(--white) 100%);
    box-shadow: 0 0 0 3px rgba(10,108,245,.12), 0 1px 0 rgba(16,24,40,.04);
  }

  /* TOP BANNER full-width, prominent */
  .ack-banner {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 18px;
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: -.005em;
    line-height: 1.4;
    border-bottom: 1px solid transparent;
    transition: all .25s ease;
  }
  .ack-banner svg { width:16px; height:16px; flex-shrink:0; }
  .ack-banner.todo {
    background: linear-gradient(180deg, #fff8e8 0%, #fef6e4 100%);
    border-bottom-color: #f0d896;
    color: #92510a;
  }
  .ack-banner.done {
    background: linear-gradient(180deg, #ecfdf5 0%, #f0fdf4 100%);
    border-bottom-color: #a7f3d0;
    color: #065f46;
  }

  /* BODY ROW checkbox + text */
  .ack-body { display: flex; gap: 14px; padding: 16px 20px; cursor: pointer; }
  .ack-card input[type="checkbox"] {
    margin-top: 3px; width: 20px; height: 20px;
    accent-color: var(--green); cursor: pointer; flex-shrink: 0;
  }
  .ack-card.locked input[type="checkbox"] { cursor: not-allowed; opacity: .3; }
  .ack-text { font-size: 14.5px; color: var(--ink); line-height: 1.55; flex: 1; }
  .ack-text strong { color: var(--navy); }

  /* LOCKED-state visual cue on the open-document expander */
  .ack-card.locked details.doc summary {
    background: linear-gradient(135deg, var(--accent) 0%, #b07f49 100%);
    color: #fff;
    padding: 11px 14px;
    border-radius: 10px;
    font-weight: 700;
    box-shadow: 0 2px 6px rgba(10,108,245,.3);
    border: 0;
  }
  .ack-card.locked details.doc { border: 0; padding: 0; background: transparent; }
  .ack-card.locked details.doc summary::after { color: #fff; font-size: 18px; }
  .ack-card.locked details.doc summary:hover { background: linear-gradient(135deg, #b07f49 0%, #9b6f3f 100%); }

  details.doc {
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    background: var(--cream-2);
    margin-top: 10px;
  }
  details.doc summary {
    cursor: pointer; outline: none;
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    list-style: none;
    display: flex; align-items: center; justify-content: space-between;
  }
  details.doc summary::-webkit-details-marker { display: none; }
  details.doc summary::after {
    content: '+'; font-size: 18px; color: var(--muted); transition: transform .2s;
  }
  details.doc[open] summary::after { transform: rotate(45deg); }
  details.doc[open] { background: var(--white); }
  details.doc h4 {
    font-family: 'Montserrat','Inter',sans-serif; font-weight: 500;
    font-size: 14px; color: var(--navy); margin: 14px 0 4px;
  }
  details.doc p {
    font-size: 13px; color: var(--ink); margin: 0 0 8px; line-height: 1.55;
  }

  /* SIGNATURE */
  .sig-wrap {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 28px;
    margin: 28px 0 16px;
    box-shadow: var(--shadow-lift);
  }
  .sig-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .14em;
    text-transform: uppercase;
    margin-bottom: 14px;
    font-weight: 600;
  }
  .sig-preview {
    font-family: 'Caveat', 'Brush Script MT', cursive;
    font-size: 44px;
    color: var(--navy);
    padding: 12px 0 6px;
    border-bottom: 1.5px dashed var(--line);
    min-height: 64px;
    line-height: 1;
    margin-bottom: 18px;
  }
  .sig-preview.empty { color: #c8cdd5; font-style: italic; font-size: 16px; font-family: 'Inter', sans-serif; }
  .sig-meta {
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 12px;
    line-height: 1.55;
  }

  /* SUBMITTED / DQ */
  .center-card {
    text-align: center;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 44px 32px;
    box-shadow: var(--shadow-lift);
  }
  .center-card .icon-wrap {
    width: 72px; height: 72px;
    margin: 0 auto 22px;
    border-radius: 50%;
    background: linear-gradient(180deg, var(--green) 0%, var(--green-deep) 100%);

const STORAGE_KEY = 'vitality_glp1_intake_v1';

function h(tag, attrs, children) {
  const el = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'onClick') el.onclick = attrs[k];
    else if (k === 'html') el.innerHTML = attrs[k];
    else el.setAttribute(k, attrs[k]);
  }
  (children||[]).forEach(c => {
    if (typeof c === 'string') el.appendChild(document.createTextNode(c));
    else if (c) el.appendChild(c);
  });
  return el;
}
function setProgress(p) { progressFill.style.width = (p*100) + '%'; }
function go(idx) {
  if (idx < 0 || idx >= flow.length) return;
  currentIdx = idx;
  const screen = flow[idx];
  if (screen.relevantWhen && !screen.relevantWhen(state)) return go(idx + 1);
  render(screen);
  setProgress((idx+1) / flow.length);
  save();
  window.scrollTo({ top: 0, behavior: 'instant' });
}
function next() { go(currentIdx + 1); }
function back() {
  let i = currentIdx - 1;
  while (i >= 0 && flow[i].relevantWhen && !flow[i].relevantWhen(state)) i--;
  if (i >= 0) go(i);
}
function disqualify(reason, isCrisis) {
  state.disqualifiedReason = reason;

// CHIPS ----------------------------------------------------------------------
function singleSelectChip(parent, key, options, opts={}) {
  const group = h('div', { class: 'opt-group' });
  options.forEach(o => {
    const btn = h('button', { class:'opt', type:'button' }, [
      h('span', { class:'check' }),
      h('div', { class:'opt-body' }, [
        document.createTextNode(o.label),
        o.sub ? h('small', {}, [document.createTextNode(o.sub)]) : null
      ])
    ]);
    if (state[key] === o.value) btn.classList.add('selected');
    btn.onclick = () => {
      state[key] = o.value; save();
      [...group.children].forEach(c => c.classList.remove('selected'));
      btn.classList.add('selected');
      if (opts.onSelect) opts.onSelect(o.value);
      setTimeout(() => {
        if (opts.disqualifyValues && opts.disqualifyValues.includes(o.value)) {
          return disqualify(opts.disqualifyReason || 'Based on your answer, this program isn\'t the right fit.', opts.crisis);
        }
        next();
      }, 280);
    };
    group.appendChild(btn);
  });
  parent.appendChild(group);
}

function textInput(parent, key, label, ph, type, opts={}) {

  input.oninput = e => { state[key] = e.target.value; save(); if (opts.onChange) opts.onChange(); validateCta(); };
  if (opts.autocomplete) input.setAttribute('autocomplete', opts.autocomplete);
  wrap.appendChild(input);
  parent.appendChild(wrap);
}

  s.innerHTML = '<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>';
  return s;
}

function ctaBtn(parent, opts={}) {

  validateCta();
  return btn;
}

  p.appendChild(card);

  // Reference the button/error off `card` (NOT document.getElementById, which is null here:
  // the render system calls viewPay before p is attached to the document). The button is
  // clickable from the start; the click guards on Clover being ready.
  const payBtn = card.querySelector('#payBtn');
  const payErr = card.querySelector('#payErr');
  const showErr = (m) => { payErr.textContent = m; payErr.style.display = 'block'; };

  payBtn.onclick = async () => {
    if (!__cloverInst) return showErr('The payment form is still loading — please wait a moment and tap Pay again.');
    payErr.style.display = 'none';
    const orig = payBtn.textContent; payBtn.disabled = true; payBtn.textContent = 'Processing…';
    try {

      if (res && res.errors) { payBtn.disabled = false; payBtn.textContent = orig; return showErr(Object.values(res.errors).map(x => (x && x.message) || x).join(' ')); }
      const body = Object.assign({}, athenaPayload(), { source: res.token, amountCents, fulfillment: 'pickup' });
      showProcessingOverlay();   // prominent full-screen wait — the athena chart build runs ~60-90s
      const r = await fetch(CLOVER_PAY_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });

      if (r.ok && j.ok) {

        hideProcessingOverlay();
        finalizeAfterPayment();
      } else if (j.error === 'paid_but_chart_failed') {
        hideProcessingOverlay();
        // Charge succeeded but the chart didn't — never silently swallow this.
        showErr('Your payment was received (ref ' + (j.charge || '') + '), but we hit a snag finalizing your record. Please call (702) 602-5002 — do NOT pay again.');
        payBtn.textContent = orig;
      } else {
        hideProcessingOverlay();
        payBtn.disabled = false; payBtn.textContent = orig;
        showErr(j.detail || j.error || 'Payment could not be completed. Please check your card details and try again.');
      }
    } catch (e) { hideProcessingOverlay(); payBtn.disabled = false; payBtn.textContent = orig; showErr('Network error completing payment. Please try again.'); }
  };

  initCloverPay(showErr);
}

const CLINICAL_FIELDS = [
  { k:'sex', q:'Sex at birth', m:{female:'Female', male:'Male'} },
  { k:'age', q:'Age' },
  { k:'heightFt', q:'Height (ft)' }, { k:'heightIn', q:'Height (in)' },

  { k:'thyroid', q:'Medullary thyroid cancer / MEN-2 history', m:{no:'No', yes:'Yes'} },
  { k:'eatingDisorder', q:'Active eating disorder', m:{no:'No', recovery:'In recovery, not active', active:'Yes, currently active'} },
  { k:'pancreatitis', q:'Pancreatitis history', m:{no:'No', acute:'Acute, fully resolved', chronic:'Chronic'} },
  { k:'gallbladder', q:'Active gallbladder disease', m:{no:'No active disease', yes:'Yes, active disease'} },
  { k:'diabetes', q:'Diabetes status', m:{none:'No diabetes', pre:'Pre-diabetic', t2:'Type 2', t1:'Type 1'} },
  { k:'giMotility', q:'Severe GI motility issue (gastroparesis)', m:{no:'No', yes:'Yes'} },
  { k:'bariatric', q:'Bariatric / major GI surgery (last 6 months)', m:{no:'No', recent:'Yes, within 6 months', old:'Yes, over 6 months ago'} },
  { k:'pregnancy', q:'Pregnant / planning / breastfeeding', m:{no:'No to all', pregnant:'Currently pregnant', planning:'Planning pregnancy', bf:'Breastfeeding'} },
  { k:'ocp', q:'Oral contraceptive use', m:{no:'No', yes:'Yes, oral', nonoral:'Non-oral (IUD / implant)'} },
  { k:'selfHarm', q:'Self-harm thoughts (past month)', m:{no:'No', passive:'Passing thoughts only', active:'Yes, with intent or a plan'} },
  { k:'currentMeds', q:'Current medications' }, { k:'allergies', q:'Allergies' },
  { k:'drug', q:'Requested medication', m:{sema:'Compounded Semaglutide', tirz:'Compounded Tirzepatide', oral:'Oral Semaglutide (no-needle)'} },
];
function buildClinicalRecord() {
  const inch = (parseInt(state.heightFt) || 0) * 12 + (parseInt(state.heightIn) || 0);
  const bmi = (inch > 0 && state.weightLbs) ? (state.weightLbs / (inch * inch) * 703).toFixed(1) : null;
  state.clinicalRecord = {
    capturedAtUTC: new Date().toISOString(),
    bmi,
    items: CLINICAL_FIELDS
      .filter(f => state[f.k] !== undefined && String(state[f.k]).trim() !== '')
      .map(f => ({ q: f.q, a: f.m ? (f.m[state[f.k]] || String(state[f.k])) : String(state[f.k]) })),
  };
  save();
}

function athenaPayload() {
  const dob = state.dob || '';                       // YYYY-MM-DD from <input type=date>
  const dobUS = /^\d{4}-\d{2}-\d{2}$/.test(dob) ? (dob.slice(5,7) + '/' + dob.slice(8,10) + '/' + dob.slice(0,4)) : dob;
  return {
    firstName: state.firstName, lastName: state.lastName, dob: dobUS,
    sex: state.sex === 'female' ? 'F' : state.sex === 'male' ? 'M' : undefined,
    email: state.email, mobilePhone: (state.phone || '').replace(/\D/g, ''),
    address1: state.addrLine1, city: state.addrCity, state: state.addrState || 'NV', zip: state.addrZip,
    program: state.drug,
    attestation: state.attestationRecord || null,
    clinical: state.clinicalRecord || null,
    idImageBase64: state.idImageBase64 || undefined,   // front-of-ID JPEG → athena driver's-license upload
  };
}

function translateTree(rootEl){
  if (window.__LANG !== 'es' || !rootEl) return;
  var dict = window.TEXT_ES;
  var walker = document.createTreeWalker(rootEl, NodeFilter.SHOW_ELEMENT | NodeFilter.SHOW_TEXT, {
    acceptNode: function(n){
      if (n.nodeType === 1){
        if (n.classList && n.classList.contains('notrans')) return NodeFilter.FILTER_REJECT;
        if (n.tagName === 'SCRIPT' || n.tagName === 'STYLE') return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_SKIP;
      }
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  var texts = [], cur;
  while ((cur = walker.nextNode())) texts.push(cur);
  texts.forEach(function(n){
    var o = n.nodeValue; if (!o) return;
    var k = o.trim(); if (!k) return;
    if (dict[k] != null){ n.nodeValue = o.split(k).join(dict[k]); }
    else if (/[A-Za-zÀ-ÿ]/.test(k)){ (window.__MISS = window.__MISS || {})[k] = (window.__MISS[k]||0)+1; }
  });
  rootEl.querySelectorAll('[placeholder],[aria-label]').forEach(function(el){
    if (el.closest('.notrans')) return;
    ['placeholder','aria-label'].forEach(function(attr){
      if (!el.hasAttribute(attr)) return;
      var o = el.getAttribute(attr); var k = o.trim(); if (!k) return;
      if (dict[k] != null) el.setAttribute(attr, o.split(k).join(dict[k]));
    });
  });
}

  vitalityUpdateShell();
});
