// Make sure heic2any is available even if the <head> CDN script hasn't loaded yet (race-safe).
var __heicPromise = null;
function ensureHeic2any() {
  if (window.heic2any) return Promise.resolve(window.heic2any);
  if (__heicPromise) return __heicPromise;
  __heicPromise = new Promise(function (res) {
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js';
    s.onload = function () { res(window.heic2any || null); };
    s.onerror = function () { res(null); };
    document.head.appendChild(s);
  });
  return __heicPromise;
}

// Re-encode any decodable image to a downscaled JPEG via canvas (normalizes format + shrinks size).
function reencodeToJpeg(blob, maxPx) {
  return new Promise(function (resolve) {
    var url = URL.createObjectURL(blob);
    var img = new Image();
    img.onload = function () {
      var w = img.naturalWidth, h = img.naturalHeight;
      var scale = Math.min(1, maxPx / Math.max(w, h));
      w = Math.max(1, Math.round(w * scale)); h = Math.max(1, Math.round(h * scale));
      var c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      c.toBlob(function (b) { resolve(b ? new File([b], 'photo.jpg', { type: 'image/jpeg' }) : null); }, 'image/jpeg', 0.88);
    };
    img.onerror = function () { URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}

// Convert ANY uploaded photo to a browser-friendly JPEG. iPhones shoot HEIC (which browsers can't
// decode) — those go through heic2any first; then a canvas pass downscales + normalizes everything
// (HEIC, PNG, TIFF, big JPEGs) to a clean JPEG so previews + Dr. DeBry's queue always display it.
async function toUploadableImage(file) {
  var working = file;
  var isHeic = /heic|heif/i.test(file.type || '') || /\.(heic|heif)$/i.test(file.name || '');
  if (isHeic) {
    var heic = await ensureHeic2any();
    if (heic) {
      try {
        var out = await heic({ blob: file, toType: 'image/jpeg', quality: 0.9 });
        working = new File([Array.isArray(out) ? out[0] : out], 'photo.jpg', { type: 'image/jpeg' });
      } catch (e) { console.warn('HEIC convert failed:', e); }
    }
  }
  try {
    var jpeg = await reencodeToJpeg(working, 1600);
    if (jpeg && jpeg.size > 0) return jpeg;
  } catch (e) { /* fall through */ }
  return working;
}

function h(tag, attrs, children) {
  const el = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'onClick') el.onclick = attrs[k];
    else if (k === 'html') el.innerHTML = attrs[k];
    else el.setAttribute(k, attrs[k]);
  }
  (children || []).forEach(c => {
    if (typeof c === 'string') el.appendChild(document.createTextNode(c));
    else if (c) el.appendChild(c);
  });
  return el;
}

function setProgress(p) { progressFill.style.width = (p * 100) + '%'; }

function go(idx) {
  if (idx < 0 || idx >= flow.length) return;
  currentIdx = idx;
  const screen = flow[idx];
  if (screen.relevantWhen && !screen.relevantWhen(state)) return go(idx + 1);
  render(screen);
  setProgress((idx + 1) / flow.length);
  save();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function next() { go(currentIdx + 1); }

function back() {
  let i = currentIdx - 1;
  while (i >= 0 && flow[i].relevantWhen && !flow[i].relevantWhen(state)) i--;
  if (i >= 0) go(i);
}

  const cta = document.getElementById('mainCta') || document.getElementById('submitBtn');

// Tokenize the card in Clover's iframe → clv_ source → vaulted card-on-file (no charge) on submit.
function loadCloverSdk() {
  if (window.Clover) return Promise.resolve();

    const s = document.createElement('script');
    s.src = CLOVER_SDK_URL; s.onload = res; s.onerror = rej; document.head.appendChild(s);
  });
  return __cloverSdkPromise;
}
async function mountClover() {

    i1.oninput = e => { state.firstName = e.target.value; save(); validateCta(); };
    w1.appendChild(i1);
    const w2 = h('label', { class: 'field' }, [h('span', { class: 'lab' }, ['Last name'])]);
    const i2 = h('input', { type: 'text', value: state.lastName || '', autocomplete: 'family-name' });
    i2.oninput = e => { state.lastName = e.target.value; save(); validateCta(); };
    w2.appendChild(i2);
    row.appendChild(w1); row.appendChild(w2);
    p.appendChild(row);

    textInput(p, 'email', 'Email', 'you@email.com', 'email', { autocomplete: 'email' });
    textInput(p, 'phone', 'Phone', '(702) 555-0123', 'tel', { autocomplete: 'tel' });

    const stateWrap = h('label', { class: 'field' }, [h('span', { class: 'lab' }, ['State'])]);
    const sel = h('select', {});
    const def = h('option', { value: '' }, ['Select your state']);
    sel.appendChild(def);
    US_STATES.forEach(([code, name]) => {
      const opt = h('option', { value: code }, [name]);
      if (state.state === code) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.onchange = e => {
      state.state = e.target.value;
      state.stateLabel = e.target.options[e.target.selectedIndex].text;
      save();
      validateCta();
    };
    stateWrap.appendChild(sel);
    p.appendChild(stateWrap);

    ctaBtn(p, {
      disabled: true,
      onClick: () => {
        if (state.state !== 'NV') return routeToNonNV();
        next();
      }
    });
  }, canContinue: (s) =>
    (s.firstName || '').length >= 1 &&
    (s.lastName || '').length >= 1 &&
    /.+@.+\..+/.test(s.email || '') &&
    (s.phone || '').replace(/\D/g, '').length >= 10 &&
    !!s.state
  },

  // 5. IDENTITY CHECK --------------------------------------------------------
  { id: 'identity', section: 'Identity verification', view: (p) => {
    p.appendChild(h('h1', {}, ['Confirm your identity']));
    p.appendChild(h('p', { class: 'lede' }, ['Federal telehealth rules require us to verify who you are before treatment.']));

    textInput(p, 'dob', 'Date of birth', '', 'date', { autocomplete: 'bday' });

    const phoneWrap = h('label', { class: 'field' }, [h('span', { class: 'lab' }, ['Confirm phone number (second identifier)'])]);
    const phoneIn = h('input', { type: 'tel', value: state.phoneConfirm || state.phone || '', autocomplete: 'tel' });
    phoneIn.oninput = e => { state.phoneConfirm = e.target.value; save(); validateCta(); };
    phoneWrap.appendChild(phoneIn);
    p.appendChild(phoneWrap);
    p.appendChild(h('p', { style: 'font-size:13px;color:var(--muted);margin:-6px 0 16px;' }, [
      'Re-enter the phone number you provided earlier. This serves as your second identifier alongside date of birth.'
    ]));

    // Government photo ID upload (identity verification)
    const idWrap = h('div', { class: 'field' });
    idWrap.appendChild(h('span', { class: 'lab' }, ['Upload a photo of your government ID (driver’s license or state ID)']));
    const idSlot = h('label', { class: 'photo-slot', style: 'display:block;max-width:300px;' });
    const idInput = h('input', { type: 'file', accept: 'image/*,.heic,.heif' });
    if (state.idPhotoPreview) idSlot.appendChild(h('img', { src: state.idPhotoPreview, alt: 'Government ID' }));
    else idSlot.appendChild(h('span', { class: 'ph' }, ['+ Upload ID']));
    idInput.onchange = async (e) => {
      const file0 = e.target.files && e.target.files[0];
      if (!file0) return;
      idSlot.innerHTML = ''; idSlot.appendChild(h('span', { class: 'ph' }, ['Uploading…']));
      const file = await toUploadableImage(file0);
      const url = URL.createObjectURL(file);
      state.idPhotoPreview = url; save();
      idSlot.innerHTML = ''; idSlot.appendChild(h('img', { src: url, alt: 'Government ID' })); idSlot.appendChild(idInput);
      validateCta();
      try {
        const ur = await fetch(PHOTO_UPLOAD_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
        const uj = await ur.json();
        if (uj && uj.uploadUrl) {
          const put = await fetch(uj.uploadUrl, { method: 'POST', headers: { 'Content-Type': file.type }, body: file });
          const pj = await put.json().catch(() => ({}));
          if (pj && pj.storageId) { state.id_photo_storage_id = pj.storageId; save(); validateCta(); }
        }
      } catch (err) { console.warn('ID upload (continues):', err); }
    };
    idSlot.appendChild(idInput);
    idWrap.appendChild(idSlot);
    p.appendChild(idWrap);
    p.appendChild(h('p', { style: 'font-size:13px;color:var(--muted);margin:6px 0 16px;' }, [
      'Your ID is used only to verify your identity, stored securely, and reviewed by Dr. DeBry.'
    ]));

    const provider = h('div', { class: 'provider-block' });
    provider.innerHTML = `
      <div class="name">Dr. Peter DeBry, MD</div>
      <div class="meta">
        Board-certified physician · Nevada-licensed<br>
        NPI ${CLINICIAN.npi}<br>
        Your intake will be reviewed by Dr. DeBry before any treatment is prescribed or any charge is made.
      </div>
    `;
    p.appendChild(provider);

    ctaBtn(p, { disabled: true });
  }, canContinue: (s) =>
    (s.dob || '').length === 10 &&
    (s.phoneConfirm || '').replace(/\D/g, '') === (s.phone || '').replace(/\D/g, '') &&
    (s.phoneConfirm || '').replace(/\D/g, '').length >= 10 &&
    !!s.idPhotoPreview
  },

  // 6. TELEHEALTH CONSENT ----------------------------------------------------
  { id: 'consent', section: 'Telehealth consent', view: (p) => {
    p.appendChild(h('h1', {}, ['Telehealth consent']));
    p.appendChild(h('p', { class: 'lede' }, ['Please read and agree before continuing to checkout.']));

    const box = h('div', { class: 'consent-box' });
    box.innerHTML = `
      <p><strong>Informed telehealth consent — final language pending counsel</strong></p>
      <p>You are consenting to asynchronous (store-and-forward) telehealth with Dr. Peter DeBry, MD for evaluation of hair loss. This is not for medical emergencies — call 911 for emergencies.</p>
      <p>Your health information is protected under HIPAA and Nevada telehealth law (NRS 629.515). Completing this intake does not guarantee a prescription. Dr. DeBry may determine that treatment is not appropriate or that a live visit is required.</p>
      <p>By checking the box below, you consent to telehealth evaluation of your submitted information and photos.</p>
    `;
    p.appendChild(box);

    state.telehealthConsent = !!state.telehealthConsent;
    const row = h('label', { class: 'consent-row' + (state.telehealthConsent ? ' checked' : '') });
    const cb = h('input', { type: 'checkbox' });
    cb.checked = state.telehealthConsent;
    cb.onchange = e => {
      state.telehealthConsent = e.target.checked;
      row.classList.toggle('checked', e.target.checked);
      save();
      validateCta();
    };
    row.appendChild(cb);
    row.appendChild(h('div', { style: 'font-size:14px;line-height:1.5;' }, [
      'I have read the telehealth consent and agree to asynchronous care with Dr. Peter DeBry, MD.'
    ]));
    p.appendChild(row);

    ctaBtn(p, {
      disabled: true,
      onClick: () => {
        state.telehealthConsentAt = new Date().toISOString();
        save();
        next();
      }
    });
  }, canContinue: (s) => !!s.telehealthConsent },

  // 7. PRODUCT SELECT + CHECKOUT ---------------------------------------------
  { id: 'checkout', section: 'Plan & payment', view: (p) => {
    p.appendChild(h('h1', {}, ['Choose your plan']));
    p.appendChild(h('p', { class: 'lede' }, ['Select a monthly plan. Cash pay — cancel anytime. Your card is saved for authorization only; you are not charged until Dr. DeBry approves your treatment.']));

    if (!state.plan) state.plan = state.sex === 'female' ? 'women' : 'men';

    const cards = h('div', { class: 'drug-cards' });
    Object.values(PLANS).forEach(plan => {
      const card = h('div', { class: 'drug-card' + (state.plan === plan.id ? ' selected' : '') }, [
        h('h3', {}, [plan.name]),
        h('div', { class: 'from' }, [plan.label + ' · monthly subscription, cancel anytime.']),
        h('div', { class: 'body' }, ['Cash pay · billed monthly · cancel anytime'])
      ]);
      card.onclick = () => {
        state.plan = plan.id;
        save();
        [...cards.querySelectorAll('.drug-card')].forEach(x => x.classList.remove('selected'));
        card.classList.add('selected');
        syncCheckoutCopy();
        syncAuthCheckbox();
      };
      cards.appendChild(card);
    });
    p.appendChild(cards);

    const panel = h('div', { class: 'checkout-panel', id: 'checkoutPanel' });
    panel.innerHTML = `
      <div class="summary-row"><span class="m" id="sumName">Plan</span><span id="sumPrice">$59/month</span></div>
      <div class="summary-row total"><span class="m">Monthly subscription, cancel anytime.</span><b id="sumTotal">$59/month</b></div>
    `;
    p.appendChild(panel);

    const compliance = h('div', { class: 'compliance-block', id: 'complianceBlock' });
    compliance.innerHTML = `
      <p><strong>A licensed physician reviews your information first. Your card is not charged and nothing ships unless your treatment is approved. If you are not approved, you will not be charged.</strong></p>
      <p id="renewalDisclosure"></p>
      <p><strong>Medications are cash pay and not billed to insurance.</strong></p>
    `;
    p.appendChild(compliance);

    const cardWrap = h('div', {});
    cardWrap.innerHTML =
      '<div class="field"><span class="lab">Card details (authorize only · not charged now)</span></div>' +
      '<div class="clv-field" id="card-number"></div>' +
      '<div class="card-row"><div class="clv-field" id="card-date" style="flex:1"></div><div class="clv-field" id="card-cvv" style="flex:1"></div><div class="clv-field" id="card-postal" style="flex:1"></div></div>';
    p.appendChild(cardWrap);

    state.authConsent = !!state.authConsent;
    const authRow = h('label', { class: 'consent-row' + (state.authConsent ? ' checked' : ''), id: 'authRow' });
    const authCb = h('input', { type: 'checkbox', id: 'authCb' });
    authCb.checked = state.authConsent;
    authCb.onchange = e => {
      state.authConsent = e.target.checked;
      authRow.classList.toggle('checked', e.target.checked);
      save();
      validateCta();
    };
    authRow.appendChild(authCb);
    const authText = h('div', { id: 'authText', style: 'font-size:14px;line-height:1.5;' });
    authRow.appendChild(authText);
    p.appendChild(authRow);

    const err = h('div', { class: 'pay-err', id: 'payErr' });
    p.appendChild(err);

    ctaBtn(p, {
      id: 'submitBtn',
      text: 'Submit intake & authorize card',
      disabled: true,
      onClick: submitCheckout
    });

    p.appendChild(h('div', { class: 'footer-note' }, [
      'Encrypted · processed by Clover · Authorization only until provider approval'
    ]));
  }, canContinue: (s) => !!s.authConsent && !!s.plan, afterRender: () => {
    syncCheckoutCopy();
    syncAuthCheckbox();
    mountClover();
  }}
];

function syncCheckoutCopy() {
  const plan = getSelectedPlan();
  const sumName = document.getElementById('sumName');
  const sumPrice = document.getElementById('sumPrice');
  const sumTotal = document.getElementById('sumTotal');
  const renewal = document.getElementById('renewalDisclosure');
  if (sumName) sumName.textContent = plan.name;
  if (sumPrice) sumPrice.textContent = '$' + plan.price + '/month';
  if (sumTotal) sumTotal.textContent = '$' + plan.price + '/month';
  if (renewal) {
    renewal.textContent = 'Your selected plan is $' + plan.price + '/month. It bills automatically every month until you cancel. To cancel, email support@vitalityweightloss.health or use the patient portal.';
  }
}

function syncAuthCheckbox() {
  const plan = getSelectedPlan();
  const authText = document.getElementById('authText');
  if (authText) authText.textContent = getAuthCheckboxText(plan.price);
}

async function submitCheckout() {
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('payErr');
  if (!btn) return;
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Submitting…';

  state.submittedAt = new Date().toISOString();
  state.cardAuthorized = false;
  save();

  try {
    // Tokenize the card in Clover's iframe → vault it card-on-file (NO charge). The card is
    // required: without a saved card there is nothing for Dr. DeBry to charge on approval.
    if (!__cloverInst) throw new Error('The secure card form is still loading. Please wait a moment and try again.');
    const tok = await __cloverInst.createToken();
    if (tok && tok.errors) throw new Error(Object.values(tok.errors).map(x => (x && x.message) || x).join(' '));
    if (!tok || !tok.token) throw new Error('Could not read the card. Please check the details and try again.');
    const sr = await fetch(SAVE_CARD_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source: tok.token, email: state.email, firstName: state.firstName, lastName: state.lastName })
    });
    const sj = await sr.json().catch(() => ({}));
    if (!sj.ok || !sj.customerId) throw new Error(sj.detail || 'We could not save your card. Please try again.');
    state.clover_customer_id = sj.customerId;
    state.cardAuthorized = true;
    state.cardAuthorizedAt = new Date().toISOString();
    save();

    // TODO backend: persist intake + card authorization
    try {
      await fetch(INTAKE_SUBMIT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          ...state,
          clinician: CLINICIAN,
          planDetails: getSelectedPlan()
        })
      });
    } catch (e) { console.warn('intake submit placeholder (demo continues):', e); }

    save();
    render({ id: 'submitted', section: 'Submitted', terminal: true, view: viewSubmitted });
    setProgress(1);
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Submit intake & authorize card';
    err.textContent = (e && e.message) || 'Could not save card authorization. Please try again.';
    err.style.display = 'block';
  }
}

// BOOT -----------------------------------------------------------------------
document.addEventListener('DOMContentLoaded', () => {
  const qs = new URLSearchParams(location.search);
  if (qs.get('setup') === '1') {
    state.cardAuthorized = true;
    state.cardAuthorizedAt = new Date().toISOString();
    save();
    render({ id: 'submitted', section: 'Submitted', terminal: true, view: viewSubmitted });
    setProgress(1);
    return;
  }
  if (state.routedToLiveVisit) {
    render({ id: 'live-visit', section: 'Next step', terminal: true, view: viewLiveVisit });
    setProgress(1);
    return;
  }
  if (state.routedToNonNV) {
    render({ id: 'non-nv', section: 'Service area', terminal: true, view: viewNonNV });
    setProgress(1);
    return;
  }
  go(0);
});
</script>
