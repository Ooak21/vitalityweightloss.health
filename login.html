<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="assets/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in Vitality Patient CRM</title>
<meta name="robots" content="noindex">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:#ffffff;color:#16201d}
  .font-display{font-family:'Montserrat','Inter',sans-serif}
  .glow{background:radial-gradient(60% 50% at 50% 0%,rgba(10,108,245,0.08),rgba(10,108,245,0) 70%)}
  .field{width:100%;background:#ffffff;border:1px solid #e6e9ee;border-radius:12px;padding:.8rem 1rem;color:#16201d;font-size:1rem}
  .field:focus{outline:none;border-color:#0a6cf5;box-shadow:0 0 0 3px rgba(10,108,245,.12)}
  .field::placeholder{color:#9aa0ab}
</style>
</head>
<body class="min-h-screen flex items-center justify-center px-5">
<div class="absolute inset-0 glow pointer-events-none"></div>
<div class="relative z-10 w-full max-w-sm">
  <div class="flex items-center justify-center gap-2.5 mb-8">
    <img src="assets/logo-icon.png" alt="Vitality Weight Loss" class="h-9 w-auto">
    <span class="font-display flex flex-col items-center leading-none"><span class="font-semibold text-2xl uppercase tracking-[.15em]">Vitality</span><span class="text-[.6rem] font-medium tracking-[.3em] uppercase text-[#16201d] mt-1">Weight Loss</span></span>
    <span class="text-[#6b7280] text-lg">Patient CRM</span>
  </div>
  <form id="loginForm" class="bg-white shadow-[0_18px_44px_-22px_rgba(16,24,40,0.18)] border border-[#e6e9ee] rounded-3xl p-7">
    <h1 class="font-display text-xl font-semibold mb-1">Welcome back</h1>
    <p class="text-sm text-[#6b7280] mb-6">Sign in to the patient dashboard.</p>
    <label class="text-xs font-semibold text-[#3d4a45]">Email</label>
    <input id="email" type="email" class="field mt-1 mb-4" placeholder="you@vitalityweightloss.health" autocomplete="username" required>
    <label class="text-xs font-semibold text-[#3d4a45]">Password</label>
    <input id="password" type="password" class="field mt-1 mb-5" placeholder="••••••••" autocomplete="current-password" required>
    <button type="submit" id="btn" class="w-full px-6 py-3 rounded-2xl bg-[#0a6cf5] text-white font-semibold hover:bg-[#0856c8] transition active:scale-[0.99]">Sign in</button>
    <div id="err" class="text-sm text-rose-600 mt-3 hidden"></div>
  </form>
  <p class="text-center text-xs text-[#9aa0ab] mt-6">Vitality Weight Loss · Las Vegas</p>
</div>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  // Milestone B: identity is Convex-native. Flip USE_CONVEX_AUTH=false to roll back to the
  // shared-Supabase issuer (both providers validate server-side, so rollback is instant).
  const USE_CONVEX_AUTH = true;
  const SB='https://jtifhcvbgxqwlywugvjv.supabase.co', ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0aWZoY3ZiZ3hxd2x5d3Vndmp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MDc5NTgsImV4cCI6MjA4ODA4Mzk1OH0.UfRVLuvM8_HPvKXUEDXb0cxR50znv16L5Tf99AnSc7g';
  const sb = createClient(SB, ANON, { auth:{ storageKey:'sb-vit-staff', persistSession:true } });
  // Auto-login removed on purpose: the staff login ALWAYS shows the form, so a leftover
  // (e.g. patient) session can never force a staff user through into the patient portal.
  const f=document.getElementById('loginForm'), err=document.getElementById('err'), btn=document.getElementById('btn');
  f.addEventListener('submit', async (e)=>{
    e.preventDefault(); err.classList.add('hidden'); btn.textContent='Signing in…'; btn.disabled=true;
    const email=document.getElementById('email').value.trim(), password=document.getElementById('password').value;
    try {
      if (USE_CONVEX_AUTH) {
        const { signIn, STORE_STAFF } = await import('./auth-convex.js');
        await signIn(email, password, STORE_STAFF);
      } else {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
      }
      location.replace('crm.html');
    } catch(error){ err.textContent = (error && error.message) || 'Sign in failed'; err.classList.remove('hidden'); btn.textContent='Sign in'; btn.disabled=false; }
  });
</script>
</body>
</html>
