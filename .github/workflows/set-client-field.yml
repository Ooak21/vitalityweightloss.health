name: Set Client Field on Project

on:
  issues:
    types: [opened, transferred]

jobs:
  set-client:
    runs-on: ubuntu-latest
    steps:
      - name: Set Client field in GitHub Project
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const repoToClient = {
              "ibs-internal": "IBS Internal",
              "ibs-portal": "IBS Portal",
              "rekindle": "Rekindle",
              "vitalityweightloss.health": "Vitality Weight Loss",
              "streetdawgs-site": "LV Street Dawgs",
              "neurowaves": "Neurowaves"
            };

            const repoName = context.repo.repo;
            const clientValue = repoToClient[repoName];

            if (!clientValue) {
              console.log(`No client mapping found for repo: ${repoName}`);
              return;
            }

            const issueNodeId = context.payload.issue.node_id;
            const ownerLogin = context.repo.owner;

            // Step 1: Find the project and the Client field (user account, not org)
            const projectQuery = await github.graphql(`
              query($login: String!) {
                user(login: $login) {
                  projectsV2(first: 10) {
                    nodes {
                      id
                      title
                      fields(first: 20) {
                        nodes {
                          ... on ProjectV2SingleSelectField {
                            id
                            name
                            options {
                              id
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, { login: ownerLogin });

            // Find IBS - Mission Control project
            const projects = projectQuery.user.projectsV2.nodes;
            const project = projects.find(p => p.title === "IBS - Mission Control");

            if (!project) {
              console.log("Project 'IBS - Mission Control' not found");
              return;
            }

            // Find the Client field
            const clientField = project.fields.nodes.find(f => f.name === "Client");

            if (!clientField) {
              console.log("Client field not found in project");
              return;
            }

            // Find the matching option
            const option = clientField.options.find(o => o.name === clientValue);

            if (!option) {
              console.log(`Option '${clientValue}' not found in Client field`);
              return;
            }

            // Step 2: Add the issue to the project
            const addResult = await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {
                  projectId: $projectId,
                  contentId: $contentId
                }) {
                  item {
                    id
                  }
                }
              }
            `, {
              projectId: project.id,
              contentId: issueNodeId
            });

            const itemId = addResult.addProjectV2ItemById.item.id;

            // Step 3: Set the Client field value
            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId,
                  itemId: $itemId,
                  fieldId: $fieldId,
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            `, {
              projectId: project.id,
              itemId: itemId,
              fieldId: clientField.id,
              optionId: option.id
            });

            console.log(`✅ Set Client field to '${clientValue}' for issue #${context.payload.issue.number}`);
