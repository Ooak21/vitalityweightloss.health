<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Vitality New Patient Intake</title>
<meta name="description" content="Personalized GLP-1 prescription reviewed by Dr. DeBry, MD within 24 hours. Compounded by a USA-licensed 503A pharmacy. Vitality Weight Loss.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --white:#ffffff;--bg:#ffffff;--bone:#ffffff;--cream:#ffffff;--cream-2:#f7f8fa;
  --surface-2:#f1f3f7;--line:#e6e9ee;--line-2:#eef0f4;--ink:#16201d;--navy:#16201d;
  --navy-2:#334155;--muted:#6b7280;--accent:#0a6cf5;--accent-d:#0856c8;--blue:#0a6cf5;
  --green:#0a6cf5;--green-deep:#0856c8;--label:#3d4a45;
  --shadow-1:0 1px 2px rgba(16,24,40,.05);
  --shadow-2:0 2px 4px rgba(16,24,40,.08),0 16px 40px rgba(16,24,40,.10);
  --shadow-lift:0 1px 2px rgba(16,24,40,.04),0 18px 44px -22px rgba(16,24,40,.14);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(60% 50% at 50% 0%,rgba(10,108,245,.07),rgba(10,108,245,0) 70%);}
a{color:inherit}
h1{font-family:'Montserrat','Inter',sans-serif;font-weight:600;letter-spacing:-.02em;font-size:1.7rem;line-height:1.18;margin:0 0 6px;color:var(--ink);}
h1 em{font-style:normal;color:var(--accent);}
h3{font-family:'Montserrat','Inter',sans-serif;}
p{margin:0;}
.lede{color:var(--muted);font-size:1rem;line-height:1.55;margin:0 0 22px;}
.section-tag{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.notrans{}
/* header */
.topbar{position:relative;z-index:2;background:#fff;border-bottom:1px solid var(--line);}
.topbar-inner{max-width:680px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:15px 20px;}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
.brand-logo{height:30px;width:auto;}
.brand-lockup{display:flex;flex-direction:column;align-items:center;line-height:1;}
.brand-name{font-family:'Montserrat',sans-serif;font-weight:600;font-size:1.18rem;letter-spacing:.15em;text-transform:uppercase;color:var(--ink);}
.brand-wl{font-family:'Montserrat',sans-serif;font-weight:500;font-size:.5rem;letter-spacing:.30em;text-transform:uppercase;color:var(--ink);margin-top:3px;}
.topbar-right{display:flex;align-items:center;gap:14px;}
.calllink{font-size:.85rem;color:var(--muted);text-decoration:none;}
.calllink:hover{color:var(--ink);}
.lang-toggle{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:2px;}
.lang-opt{appearance:none;border:0;background:transparent;font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.03em;color:var(--muted);padding:4px 9px;border-radius:7px;cursor:pointer;line-height:1;transition:.18s;}
.lang-opt:hover{color:var(--ink);}
.lang-opt.active{background:#fff;color:var(--accent);box-shadow:0 1px 2px rgba(16,24,40,.1);}
.trust-pill{display:none;}
/* progress */
.progress-bar{position:relative;z-index:2;max-width:640px;margin:20px auto 0;height:3px;background:var(--line);border-radius:9999px;overflow:hidden;}
.progress-fill{height:100%;width:0;background:var(--accent);transition:width .4s cubic-bezier(.23,1,.32,1);}
/* layout / card */
#root{position:relative;z-index:2;max-width:680px;margin:0 auto;padding:26px 20px 90px;}
.screen{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow-lift);padding:30px 30px 34px;animation:fade .35s ease;}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:0;color:var(--muted);font:inherit;font-size:.85rem;cursor:pointer;padding:0;margin-bottom:16px;}
.back-btn:hover{color:var(--ink);}
.back-btn svg{width:16px;height:16px;}
/* welcome hero */
.hero{text-align:center;}
.hero-logo{height:62px;width:auto;display:block;margin:2px auto 18px;}
.hero h1{font-size:2rem;}
.hero-stat{display:inline-flex;flex-direction:column;align-items:center;border:1px solid var(--line);background:var(--cream-2);border-radius:16px;padding:14px 30px;margin:8px auto 6px;}
.hero-stat .big{font-family:'Montserrat',sans-serif;font-weight:700;font-size:1.9rem;color:var(--accent);}
.hero-stat .lbl{font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:3px;}
.trust-row{display:flex;flex-wrap:wrap;justify-content:center;gap:9px 18px;margin:18px 0;font-size:.8rem;color:var(--muted);}
.trust-row span{display:inline-flex;align-items:center;gap:6px;}
.trust-row svg{width:15px;height:15px;color:var(--accent);}
.footer-note{font-size:.72rem;color:#9aa0ab;text-align:center;margin-top:16px;line-height:1.5;}
/* single-select options */
.opt-group{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.opt{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:left;background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 16px;cursor:pointer;font:inherit;font-size:1rem;color:var(--ink);transition:.15s;}
.opt:hover{border-color:#c7ccd6;}
.opt.selected{border-color:var(--accent);background:rgba(10,108,245,.06);}
.opt .check{flex:0 0 auto;width:20px;height:20px;border:2px solid var(--line);border-radius:50%;margin-top:1px;position:relative;transition:.15s;}
.opt.selected .check{border-color:var(--accent);background:var(--accent);}
.opt.selected .check::after{content:'';position:absolute;left:6px;top:2.5px;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);}
.opt-body{display:flex;flex-direction:column;}
.opt-body small{color:var(--muted);font-size:.82rem;margin-top:3px;line-height:1.4;}
/* fields */
.field{display:block;margin-bottom:2px;}
.field .lab{display:block;font-size:.8rem;font-weight:600;letter-spacing:.02em;color:var(--label);margin-bottom:7px;}
.field input,.field textarea,.field select{width:100%;background:#fff;border:1px solid var(--line);border-radius:14px;padding:.85rem 1rem;color:var(--ink);font:inherit;font-size:1rem;transition:.15s;}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(10,108,245,.12);}
.field input::placeholder,.field textarea::placeholder{color:#9aa0ab;}
.field textarea{resize:vertical;min-height:80px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:2px;}
.row .field{margin-bottom:0;}
/* cta */
.cta{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:#fff;border:0;border-radius:9999px;padding:.8rem 1.7rem;font:inherit;font-weight:600;font-size:1rem;cursor:pointer;transition:.15s;margin-top:20px;text-decoration:none;}
.cta:hover{background:var(--accent-d);}
.cta:disabled{opacity:.4;cursor:not-allowed;}
.cta svg{width:18px;height:18px;}
.cta-green{background:var(--accent);}
.cta-green:hover{background:var(--accent-d);}
/* drug cards */
.drug-cards{display:flex;flex-direction:column;gap:12px;margin-top:6px;}
.drug-card{border:1px solid var(--line);border-radius:16px;padding:16px 18px;cursor:pointer;transition:.15s;background:#fff;position:relative;}
.drug-card:hover{border-color:#c7ccd6;}
.drug-card.selected{border-color:var(--accent);background:rgba(10,108,245,.05);}
.drug-card .pill{display:inline-block;font-size:.64rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);background:rgba(10,108,245,.1);border-radius:9999px;padding:3px 10px;margin-bottom:9px;}
.drug-card h3{font-size:1.1rem;margin:0 0 4px;color:var(--ink);}
.drug-card .from{font-weight:600;color:var(--ink);margin-bottom:6px;font-size:.92rem;}
.drug-card .body{font-size:.9rem;color:var(--muted);line-height:1.5;margin-bottom:8px;}
.drug-card .disc{font-size:.82rem;color:var(--muted);line-height:1.5;}
/* consent acks */
.ack-card{border:1px solid var(--line);border-radius:16px;overflow:hidden;margin:10px 0;background:#fff;}
.ack-card.checked{border-color:var(--accent);}
.ack-banner{display:flex;align-items:center;gap:8px;font-size:.73rem;font-weight:600;padding:8px 14px;}
.ack-banner svg{width:15px;height:15px;flex:0 0 auto;}
.ack-banner.todo{background:#fff7ed;color:#b45309;}
.ack-banner.done{background:rgba(10,108,245,.08);color:var(--accent);}
.ack-body{display:flex;gap:11px;align-items:flex-start;padding:13px 15px;cursor:pointer;}
.ack-body>input[type=checkbox]{margin-top:2px;width:17px;height:17px;accent-color:var(--accent);flex:0 0 auto;}
.ack-text{font-size:.86rem;line-height:1.5;color:var(--ink);}
.ack-text .doc{margin-top:9px;}
.ack-text summary{font-size:.8rem;color:var(--accent);cursor:pointer;font-weight:600;}
.ack-text .doc h4{font-size:.85rem;margin:10px 0 4px;color:var(--ink);}
.ack-text .doc p{font-size:.82rem;color:var(--muted);line-height:1.55;margin:0 0 8px;}
.ack-card.locked .ack-body{opacity:.65;}
/* signature */
.sig-wrap{margin-top:20px;border-top:1px solid var(--line);padding-top:18px;}
.sig-label{font-size:.8rem;font-weight:600;color:var(--label);margin-bottom:8px;}
.sig-preview{font-family:'Caveat',cursive;font-size:1.9rem;color:var(--ink);border-bottom:2px solid var(--line);padding:2px 2px 6px;min-height:46px;margin-bottom:12px;}
.sig-preview.empty{color:#c7ccd6;}
.sig-wrap>input{width:100%;background:#fff;border:1px solid var(--line);border-radius:14px;padding:.8rem 1rem;font:inherit;font-size:1rem;color:var(--ink);}
.sig-wrap>input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(10,108,245,.12);}
.sig-meta{font-size:.72rem;color:#9aa0ab;line-height:1.5;margin-top:10px;}
/* info boxes */
.info{background:var(--cream-2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:.86rem;line-height:1.5;color:var(--ink);margin:10px 0;}
.info.warn{background:#fff7ed;border-color:#fed7aa;}
.info strong{color:var(--ink);}
/* result / approved */
.center-card{text-align:center;}
.icon-wrap{width:60px;height:60px;border-radius:50%;background:rgba(10,108,245,.1);border:1px solid rgba(10,108,245,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;color:var(--accent);}
.icon-wrap svg{width:30px;height:30px;}
.next-steps{text-align:left;background:var(--cream-2);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin:16px 0;}
.next-steps h3{font-size:.95rem;margin:0 0 8px;color:var(--ink);}
.next-steps ol{margin:0;padding-left:18px;}
.next-steps li{font-size:.86rem;color:var(--muted);line-height:1.6;margin-bottom:6px;}
.skip-info{font-size:.75rem;color:#9aa0ab;margin-top:14px;}
@media(max-width:560px){
  .screen{padding:22px 18px 26px;border-radius:18px;}
  .row{grid-template-columns:1fr;}
  h1,.hero h1{font-size:1.5rem;}
  .calllink{display:none;}
}
</style>
</head>

<script>
// CONFIG ---------------------------------------------------------------------
// Clover hosted-checkout URLs per track.
// Each Clover button should be set up as: 1x $XX intro charge + 5x recurring $YY/mo.
const CLOVER_URL_SEMA = 'https://link.clover.com/urlshortener/fw4vjT';  // sema inj: $145 intro / $199 x5
const CLOVER_URL_TIRZ = 'https://link.clover.com/urlshortener/2T5N7F';  // tirz inj: $249 intro / $399 x5
const CLOVER_URL_ORAL = 'https://link.clover.com/urlshortener/9h9CJ7';  // oral sema: $199 intro / $299 x5
const PRICING = {
  sema: { intro: 145, monthly: 199, label: '$145 first month · $199/mo thereafter', term: 1140 },
  tirz: { intro: 249, monthly: 399, label: '$249 first month · $399/mo thereafter', term: 2244 },
  oral: { intro: 199, monthly: 299, label: '$199 first month · $299/mo thereafter', term: 1694 }
};
const PHARMACY = { name: 'a USA-licensed 503A compounding pharmacy', license: '', city: 'Las Vegas, NV' };
const CLINICIAN = { name: 'Peter DeBry, MD', npi: '1831137991' };

// ELIGIBILITY (demo scaffold) ------------------------------------------------
// Medical GLP-1 eligibility = cleared every hard-stop screen above (no disqualify).
// MEDICARE GLP-1 BRIDGE PLACEHOLDER CRITERIA. Not yet clinician-confirmed.
// TODO(before live): replace with Dr. DeBry's real Bridge rules (eff. July 1).
const MEDICARE_CRITERIA = { minAge: 65, requiresMedicare: true, version: 'placeholder-2026-06' };
function computeEligibility(s) {
  // Re-evaluate from the actual answers (source of truth). A hard-stop answer no longer rejects
  // the patient it flags them for provider review before the paid script can be offered.
  const CHECKS = [
    { code:'residency',   hit: s.isNV === 'no' },
    { code:'thyroid',     hit: s.thyroid === 'yes' },
    { code:'eating',      hit: s.eatingDisorder === 'active' },
    { code:'pancreatitis',hit: s.pancreatitis === 'chronic' },
    { code:'gallbladder', hit: s.gallbladder === 'yes' },
    { code:'diabetes_t1', hit: s.diabetes === 't1' },
    { code:'gi_motility', hit: s.giMotility === 'yes' },
    { code:'bariatric',   hit: s.bariatric === 'recent' },
    { code:'pregnancy',   hit: s.sex === 'female' && ['pregnant','planning','bf'].includes(s.pregnancy) },
    { code:'self_harm',   hit: s.selfHarm === 'active' }
  ];
  const reviewCodes = CHECKS.filter(c => c.hit).map(c => c.code);
  const needsReview = reviewCodes.length > 0;
  const glp1 = !needsReview;                         // directly offerable only when nothing needs review
  const age = parseInt(s.age) || 0;
  const medicare = glp1 && s.medicare === 'yes' && age >= MEDICARE_CRITERIA.minAge;
  const programs = [];
  if (glp1) programs.push('glp1');
  if (medicare) programs.push('medicare_glp1');
  s.glp1_eligible = glp1;
  s.needs_review = needsReview;
  s.review_codes = reviewCodes;
  s.medicare_glp1_eligible = medicare;
  s.programs_qualified = programs;
  s.eligibility_version = MEDICARE_CRITERIA.version;   // flag: placeholder, confirm w/ Dr. DeBry
  save();
  return s;
}

// STATE ----------------------------------------------------------------------
const STORAGE_KEY = 'vitality_glp1_intake_v1';
const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

let currentIdx = 0;
const root = document.getElementById('root');
const progressFill = document.getElementById('progressFill');

// HELPERS --------------------------------------------------------------------
function h(tag, attrs, children) {
  const el = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'onClick') el.onclick = attrs[k];
    else if (k === 'html') el.innerHTML = attrs[k];
    else el.setAttribute(k, attrs[k]);
  }
  (children||[]).forEach(c => {
    if (typeof c === 'string') el.appendChild(document.createTextNode(c));
    else if (c) el.appendChild(c);
  });
  return el;
}
function setProgress(p) { progressFill.style.width = (p*100) + '%'; }
function go(idx) {
  if (idx < 0 || idx >= flow.length) return;
  currentIdx = idx;
  const screen = flow[idx];
  if (screen.relevantWhen && !screen.relevantWhen(state)) return go(idx + 1);
  render(screen);
  setProgress((idx+1) / flow.length);
  save();
  window.scrollTo({ top: 0, behavior: 'instant' });
}
function next() { go(currentIdx + 1); }
function back() {
  let i = currentIdx - 1;
  while (i >= 0 && flow[i].relevantWhen && !flow[i].relevantWhen(state)) i--;
  if (i >= 0) go(i);
}
function disqualify(reason, isCrisis) {
  state.disqualifiedReason = reason;
  state.crisis = !!isCrisis;
  save();
  render({ id: 'dq', section: 'Result', view: viewDisqualify });
  setProgress(1);
}
function render(screen) {
  root.innerHTML = '';
  const wrap = h('div', { class: 'screen' });
  if (currentIdx > 0 && screen.id !== 'dq' && screen.id !== 'submitted') {
    const b = h('button', { class: 'back-btn', type:'button' });
    b.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>Back';
    b.onclick = back;
    wrap.appendChild(b);
  }
  if (screen.section) {
    const tag = h('div', { class: 'section-tag' }); tag.textContent = screen.section;
    wrap.appendChild(tag);
  }
  screen.view(wrap);
  root.appendChild(wrap);
}

// CHIPS ----------------------------------------------------------------------
function singleSelectChip(parent, key, options, opts={}) {
  const group = h('div', { class: 'opt-group' });
  options.forEach(o => {
    const btn = h('button', { class:'opt', type:'button' }, [
      h('span', { class:'check' }),
      h('div', { class:'opt-body' }, [
        document.createTextNode(o.label),
        o.sub ? h('small', {}, [document.createTextNode(o.sub)]) : null
      ])
    ]);
    if (state[key] === o.value) btn.classList.add('selected');
    btn.onclick = () => {
      state[key] = o.value; save();
      [...group.children].forEach(c => c.classList.remove('selected'));
      btn.classList.add('selected');
      if (opts.onSelect) opts.onSelect(o.value);
      setTimeout(() => {
        if (opts.disqualifyValues && opts.disqualifyValues.includes(o.value)) {
          if (opts.crisis) return disqualify(opts.disqualifyReason || 'Based on your answer, this program isn\'t the right fit.', true);  // safety: 988, terminal
          // medical contraindication: flag for provider review, but let them finish the intake
          state.reviewFlags = state.reviewFlags || {}; state.reviewFlags[key] = o.value; save();
          next(); return;
        }
        // passing value: clear any prior review flag for this question
        if (state.reviewFlags && (key in state.reviewFlags)) { delete state.reviewFlags[key]; }
        delete state.disqualifiedReason; state.crisis = false; save();
        next();
      }, 280);
    };
    group.appendChild(btn);
  });
  parent.appendChild(group);
}

function textInput(parent, key, label, ph, type, opts={}) {
  const wrap = h('label', { class:'field' }, [ h('span', { class:'lab' }, [label]) ]);
  const input = h('input', { type: type||'text', placeholder: ph||'', value: state[key]||'' });
  input.oninput = e => { state[key] = e.target.value; save(); if (opts.onChange) opts.onChange(); validateCta(); };
  if (opts.autocomplete) input.setAttribute('autocomplete', opts.autocomplete);
  wrap.appendChild(input);
  parent.appendChild(wrap);
}

function ctaArrow() {
  const s = document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.setAttribute('viewBox','0 0 24 24'); s.setAttribute('fill','none');
  s.setAttribute('stroke','currentColor'); s.setAttribute('stroke-width','2.2');
  s.setAttribute('stroke-linecap','round'); s.setAttribute('stroke-linejoin','round');
  s.innerHTML = '<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>';
  return s;
}

function ctaBtn(parent, opts={}) {
  const btn = h('button', { class:'cta cta-green', type:'button' }, [
    document.createTextNode(opts.text || 'Continue'),
    ctaArrow()
  ]);
  btn.id = opts.id || 'mainCta';
  btn.onclick = opts.onClick || next;
  if (opts.disabled) btn.disabled = true;
  parent.appendChild(btn);
  validateCta();
  return btn;

function validateCta() {
  const cta = document.getElementById('mainCta');
  if (!cta) return;
  const screen = flow[currentIdx];

  cta.disabled = !screen.canContinue(state);
}

    submit.onclick = submitIntake;
    p.appendChild(h('div', { style:'text-align:center;' }, [submit]));
    p.appendChild(h('div', { class:'skip-info' }, ['Secure Clover checkout · Cancel anytime']));

    function validateAll() {
      const allAcks = ACKS.every(a => state.acks[a.id]);

async function submitIntake() {
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.innerHTML = (window.__LANG==='es') ? 'Enviando…' : 'Submitting…';
  state.signedAt = new Date().toISOString();
  state.userAgent = navigator.userAgent;
  state.pageUrl = window.location.href;
  save();
  computeEligibility(state);   // flags the record: glp1_eligible / medicare_glp1_eligible / programs_qualified
  // DEMO (no real PHI): create the patient's portal login + record, flag it, then sign them in.
  state.portalReady = false;
  try {
    const tags = [];
    if (state.glp1_eligible) tags.push('glp1-eligible');
    if (state.medicare_glp1_eligible) tags.push('medicare-glp1-eligible');
    if (state.needs_review) { tags.push('needs-review'); (state.review_codes||[]).forEach(c => tags.push('review:' + c)); }
    if (state.reason) tags.push('reason:' + state.reason);
    const r = await fetch(window.__SB_URL + '/functions/v1/vit-portal-signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': window.__ANON, 'Authorization': 'Bearer ' + window.__ANON },
      body: JSON.stringify({
        email: state.email, password: state.password,
        first_name: state.firstName, last_name: state.lastName, phone: state.phone, dob: state.dob,
        program: state.reason || 'glp1', tags, consent_signed_at: state.signedAt
      })
    });
    const j = await r.json();
    if (j && j.ok && window.__sb) {
      const { error } = await window.__sb.auth.signInWithPassword({ email: state.email, password: state.password });
      if (!error) state.portalReady = true;
    }
  } catch (e) { console.warn('portal signup (demo continues):', e); }
  try {
    await fetch(window.__CONVEX_SITE + '/patient-prefs', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: state.email, first: state.firstName, last: state.lastName, phone: state.phone,
        prefs: {
          food_allergies: state.foodAllergies || '', diet_style: state.dietStyle || '', dislikes: state.dislikes || '',
          injuries: state.injuries || '', training_location: state.trainingLocation || '', equipment: state.equipment || '', activity: state.activity || ''
        }
      })
    });
  } catch (e) { console.warn('prefs bridge (continues):', e); }
  delete state.password; delete state.password2; save();
  render({ id:'submitted', section:'Submitted', view: viewSubmitted });
  setProgress(1);
}

function translateTree(rootEl){
  if (window.__LANG !== 'es' || !rootEl) return;
  var dict = window.TEXT_ES;
  var walker = document.createTreeWalker(rootEl, NodeFilter.SHOW_ELEMENT | NodeFilter.SHOW_TEXT, {
    acceptNode: function(n){
      if (n.nodeType === 1){
        if (n.classList && n.classList.contains('notrans')) return NodeFilter.FILTER_REJECT;
        if (n.tagName === 'SCRIPT' || n.tagName === 'STYLE') return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_SKIP;
      }
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  var texts = [], cur;
  while ((cur = walker.nextNode())) texts.push(cur);
  texts.forEach(function(n){
    var o = n.nodeValue; if (!o) return;
    var k = o.trim(); if (!k) return;
    if (dict[k] != null){ n.nodeValue = o.split(k).join(dict[k]); }
    else if (/[A-Za-zÀ-ÿ]/.test(k)){ (window.__MISS = window.__MISS || {})[k] = (window.__MISS[k]||0)+1; }
  });
  rootEl.querySelectorAll('[placeholder],[aria-label]').forEach(function(el){
    if (el.closest('.notrans')) return;
    ['placeholder','aria-label'].forEach(function(attr){
      if (!el.hasAttribute(attr)) return;
      var o = el.getAttribute(attr); var k = o.trim(); if (!k) return;
      if (dict[k] != null) el.setAttribute(attr, o.split(k).join(dict[k]));
    });
  });
}

(function(){
  var __origRender = render;
  render = function(screen){
    window.__lastScreen = screen;
    __origRender(screen);
    try { translateTree(root); } catch(e){ console.warn('i18n render', e); }
  };
})();

  document.title = es ? 'Vitality Evaluación de Cuidado GLP-1' : 'Vitality GLP-1 Care Intake';
  var tp = document.getElementById('trustPill');
  if (tp) tp.textContent = es ? 'Revisado por un médico en 24 h' : 'MD-reviewed in 24h';
  var opts = document.querySelectorAll('.lang-opt');
  for (var i=0;i<opts.length;i++) opts[i].classList.toggle('active', opts[i].getAttribute('data-lang') === window.__LANG);
}

function vitalitySetLang(lang){
  if (lang !== 'es' && lang !== 'en') return;
  window.__LANG = lang;
  try { localStorage.setItem('vitality_lang', lang); } catch(e){}
  vitalityUpdateShell();
  if (window.__lastScreen) render(window.__lastScreen);
}
