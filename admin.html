    const delBtn = (t.clinical && t.locked) ? '' : `<button data-del="${t.id}" class="text-[#c0c4cc] hover:text-rose-500 text-base leading-none">×</button>`;
    return `<div class="rounded-lg border ${t.clinical?'border-[#dbe7f5]':'border-[#eef0f4]'} bg-white p-2.5">

      <span class="w-2 h-2 rounded-full ${pri[t.priority]||pri.normal} mt-1.5 shrink-0" title="${esc(t.priority)}"></span>
      <div class="flex-1 min-w-0"><div class="text-sm font-medium ${t.status==='done'?'line-through text-[#9aa0ab]':''}">${esc(t.title)}</div><div class="text-[11px] text-[#9aa0ab]">${t.assignee?esc(t.assignee):'unassigned'}${t.due?' · due '+esc(t.due):''} ${badge}</div>${clinNotes}</div>

    <select data-move="${t.id}" class="field text-[11px] mt-2 w-full">${cols.map(c=>`<option value="${c[0]}" ${t.status===c[0]?'selected':''}>${c[1]}</option>`).join('')}</select>
  </div>`;};
  return `<section class="card p-6">
    <h2 class="font-display text-lg font-semibold mb-3">Task board</h2>

      <select id="tPriority" class="field text-sm"><option value="normal">Normal</option><option value="high">High</option><option value="low">Low</option></select>
      <input id="tDue" type="date" class="field text-sm">
      <button id="tAdd" class="px-4 py-2 rounded-lg bg-[#0a6cf5] text-white text-sm font-semibold">Add</button>
    </div>
    <div class="grid md:grid-cols-3 gap-4">${cols.map(c=>`<div><div class="text-xs font-semibold text-[#6b7280] mb-2 flex items-center justify-between">${c[1]} <span class="text-[#9aa0ab]">${tasks.filter(t=>t.status===c[0]).length}</span></div><div class="space-y-2">${tasks.filter(t=>t.status===c[0]).map(card).join('')||'<div class="text-[11px] text-[#c0c4cc] py-2">Nothing here</div>'}</div></div>`).join('')}</div>
  </section>`;
}

function viewSystems(){
  if(!SYS){ (async()=>{ SYS=await sysApi({action:'load'}); render(); })(); return '<div class="card p-8 text-center text-[#9aa0ab] text-sm">Loading…</div>'; }
  const latest=SYS.latest, results=(latest&&latest.results)||[], hist=SYS.history||[];
  const dot=(s)=> s==='up'?'bg-emerald-500':s==='warn'?'bg-amber-500':s==='skip'?'bg-[#cbd2da]':'bg-rose-500';
  const lab=(s)=> s==='up'?'OK':s==='warn'?'Check':s==='skip'?'n/a':'Down';
  const txt=(s)=> s==='up'?'text-emerald-600':s==='warn'?'text-amber-600':s==='skip'?'text-[#9aa0ab]':'text-rose-600';
  const issues=results.filter(r=>r.status==='down'||r.status==='warn').length;
  const clear=latest&&latest.all_clear;
  const banner = !latest ? `<div class="rounded-xl bg-[#f7f8fa] border border-[#eef0f4] p-4 text-center text-sm text-[#6b7280]">No check run yet. Run one to confirm all systems are firing.</div>`
    : clear ? `<div class="rounded-xl bg-emerald-50 border border-emerald-200 p-4 text-center"><div class="font-display text-lg font-semibold text-emerald-700">✓ All systems clear</div><div class="text-xs text-emerald-600 mt-1">Last checked ${fmtTs(latest.ran_at)} by ${esc(latest.ran_by||'')}</div></div>`
    : `<div class="rounded-xl bg-amber-50 border border-amber-200 p-4 text-center"><div class="font-display text-lg font-semibold text-amber-700">${issues} need${issues===1?'s':''} a look</div><div class="text-xs text-amber-600 mt-1">Last checked ${fmtTs(latest.ran_at)} by ${esc(latest.ran_by||'')}</div></div>`;
  return `<section class="card p-6">
    <div class="flex items-center justify-between mb-4"><h2 class="font-display text-lg font-semibold">Systems check</h2><button id="runChk" class="px-4 py-2 rounded-lg bg-[#0a6cf5] text-white text-sm font-semibold">Run check</button></div>
    ${banner}
    <div class="grid sm:grid-cols-2 gap-2 mt-4">${results.map(r=>`<div class="flex items-center gap-3 rounded-lg border border-[#eef0f4] bg-[#fbfcfe] p-2.5"><span class="w-2.5 h-2.5 rounded-full ${dot(r.status)} shrink-0"></span><div class="flex-1 min-w-0"><div class="text-sm font-medium truncate">${esc(r.name)}</div><div class="text-[10px] text-[#9aa0ab] uppercase tracking-wide">${esc(r.cat)}</div></div><span class="text-[11px] font-semibold ${txt(r.status)}">${lab(r.status)}</span>${r.ms?`<span class="text-[10px] text-[#c0c4cc] seg">${r.ms}ms</span>`:''}</div>`).join('')||'<div class="text-sm text-[#9aa0ab] col-span-2 text-center py-4">Run a check to see status.</div>'}</div>
    ${hist.length?`<div class="mt-5"><div class="text-xs font-semibold text-[#6b7280] mb-2">Recent runs</div><div class="space-y-1">${hist.slice(0,8).map(h=>`<div class="flex items-center justify-between text-xs py-1 border-b border-[#f5f6f8]"><span class="text-[#6b7280]">${fmtTs(h.ran_at)} · ${esc(h.ran_by||'')}</span><span class="${h.all_clear?'text-emerald-600':'text-amber-600'} font-semibold">${h.all_clear?'all clear':'had issues'}</span></div>`).join('')}</div></div>`:''}
    <p class="text-[11px] text-[#9aa0ab] mt-4">Run this at open, mid-day, and close so the opener can confirm every webhook, server, and service is firing. Automatic 3x/day checks are the next step (scheduled cron).</p>
  </section>`;
}

function viewReports(){

  const flag=(c)=> (!c.outcome || (c.dur!=null && c.dur<5));
  const kpi=(v,l)=>`<div class="rounded-xl bg-[#f7f8fa] border border-[#eef0f4] p-4 text-center"><div class="font-display text-2xl font-semibold seg">${v}</div><div class="text-[11px] uppercase tracking-wide text-[#9aa0ab] font-semibold mt-.5">${l}</div></div>`;

    <div class="flex items-center justify-between mb-4"><h2 class="font-display text-lg font-semibold">Receptionist calls</h2><button id="callcsv" class="px-3 py-1.5 rounded-lg border border-[#e6e9ee] text-xs font-semibold hover:bg-[#f1f3f7]">⬇ Export CSV</button></div>
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">${kpi(k.calls||0,'calls')}${kpi(mm(k.avgDur),'avg length')}${kpi(k.chats||0,'web chats')}${kpi(k.chatLeads||0,'chat leads')}</div>
    <div class="flex flex-wrap gap-2 mb-4">${Object.entries(k.outcomes||{}).map(([o,n])=>`<span class="pill bg-[#eaf2ff] text-[#0a3d7a]">${esc(o)}: ${n}</span>`).join('')}</div>
    <div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-[11px] uppercase tracking-wide text-[#9aa0ab] text-left border-b border-[#eef0f4]"><th class="py-2 pr-3">When</th><th class="py-2 pr-3">From</th><th class="py-2 pr-3">Intent</th><th class="py-2 pr-3">Outcome</th><th class="py-2 pr-3">Length</th><th class="py-2 pr-3">Transcript</th><th class="py-2">Review</th></tr></thead>
      <tbody>${calls.length?calls.map(c=>`<tr class="border-b border-[#f5f6f8]"><td class="py-2 pr-3 whitespace-nowrap text-[#6b7280]">${fmtd(c.ts)}</td><td class="py-2 pr-3">${esc(c.from||' ')}</td><td class="py-2 pr-3">${esc(c.intent||' ')}</td><td class="py-2 pr-3">${esc(c.outcome||' ')}</td><td class="py-2 pr-3 seg">${mm(c.dur)}</td><td class="py-2 pr-3 text-[11px] ${c.tref?'text-[#0a6cf5]':'text-[#c0c4cc]'}">${c.tref?'available':'pending'}</td><td class="py-2">${flag(c)?'<span class="pill bg-[#fde8e8] text-rose-600">flag</span>':'<span class="text-[#9aa0ab] text-xs">ok</span>'}</td></tr>`).join(''):`<tr><td colspan="7" class="py-6 text-center text-[#9aa0ab]">No calls yet.</td></tr>`}</tbody></table></div>
    <p class="text-[11px] text-[#9aa0ab] mt-3">Every call the AI receptionist handles is captured here, so an auditor pulls calls and transcripts from this panel, not from the phone vendor. Automatic HIPAA-exposure flags and full transcript review activate once calls run on the dedicated HIPAA project with the carrier BAA in place.</p>
  </section>`;
}

function viewBilling(){
  if(!BILLING){ (async()=>{ BILLING=await api({action:'billing',from:BILL_FROM,to:BILL_TO}); render(); })(); return '<div class="card p-8 text-center text-[#9aa0ab] text-sm">Loading billing…</div>'; }
  const B=BILLING;
  if(!B.ok){ return '<div class="card p-8 text-center text-rose-600 text-sm">Billing is admin-only. '+esc(B.error||'')+'</div>'; }
  const usd=(m)=>{ const d=(m||0)/1e6; return '$'+(d<1?d.toFixed(4):d.toFixed(2)); };
  const fmtd=(s)=>{ if(!s)return''; const d=new Date(s); return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); };
  const dISO=(t)=>new Date(t).toISOString().slice(0,10);
  const prov=B.providers||{}, surf=B.surfaces||{}, acts=B.actors||[], recent=B.recent||[];
  const provTotal=(p)=>prov[p]?usd(prov[p].micros):'$0.00';
  const FEATURES={menu_scan:'Menu scanner',vee_chat:'Vee chat',plan_gen:'Plan generator'};
  const PROV={anthropic:'Anthropic (Claude)',xai:'xAI (Grok)'};
  const coverEnd=CONTRACT_START+COVER_DAYS*86400000;
  const daysLeft=Math.ceil((coverEnd-Date.now())/86400000);
  const coverEndStr=new Date(coverEnd).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const banner = daysLeft>0
    ? `<div class="rounded-xl border border-[#cfe6d4] bg-[#f0faf2] p-4 mb-4 text-sm"><span class="font-semibold text-[#0a7a3d]">Costs covered through ${coverEndStr}</span> · ${daysLeft} day${daysLeft===1?'':'s'} left. After that, the contract allows amending the fee based on the usage below.</div>`
    : `<div class="rounded-xl border border-[#f0d9a0] bg-[#fdf6e8] p-4 mb-4 text-sm"><span class="font-semibold text-[#9a6a00]">Coverage period ended ${coverEndStr}.</span> You can amend the fee now based on the usage below.</div>`;
  const kpi=(v,l,sub)=>`<div class="rounded-xl bg-[#f7f8fa] border border-[#eef0f4] p-4"><div class="font-display text-2xl font-semibold seg">${v}</div><div class="text-[11px] uppercase tracking-wide text-[#9aa0ab] font-semibold mt-.5">${l}</div>${sub?`<div class="text-[11px] text-[#9aa0ab] mt-1">${sub}</div>`:''}</div>`;
  const featRows=Object.keys(surf).length?Object.entries(surf).sort((a,b)=>b[1].micros-a[1].micros).map(([k,v])=>`<tr class="border-b border-[#f5f6f8]"><td class="py-2 pr-3 font-medium">${FEATURES[k]||esc(k)}</td><td class="py-2 pr-3 seg">${v.calls}</td><td class="py-2 pr-3 seg text-[#6b7280]">${(v.in||0).toLocaleString()}</td><td class="py-2 pr-3 seg text-[#6b7280]">${(v.out||0).toLocaleString()}</td><td class="py-2 seg font-semibold text-right">${usd(v.micros)}</td></tr>`).join(''):`<tr><td colspan="5" class="py-6 text-center text-[#9aa0ab]">No usage in this period yet.</td></tr>`;
  const actRows=acts.length?acts.map(a=>`<tr class="border-b border-[#f5f6f8]"><td class="py-2 pr-3 font-medium">${esc(a.actor)}</td><td class="py-2 pr-3"><span class="pill bg-[#eef2f7] text-[#4b5563] text-[10px]">${esc(a.role)}</span></td><td class="py-2 pr-3 seg">${a.calls}</td><td class="py-2 seg font-semibold text-right">${usd(a.micros)}</td></tr>`).join(''):`<tr><td colspan="4" class="py-6 text-center text-[#9aa0ab]">No attributed usage yet.</td></tr>`;
  const recRows=recent.length?recent.map(r=>`<tr class="border-b border-[#f5f6f8]"><td class="py-2 pr-3 whitespace-nowrap text-[#6b7280]">${fmtd(r.ts)}</td><td class="py-2 pr-3">${PROV[r.provider]||esc(r.provider)}</td><td class="py-2 pr-3">${FEATURES[r.surface]||esc(r.surface)}</td><td class="py-2 pr-3 text-[#6b7280]">${esc(r.actor||(r.role==='public'?'Website visitor':'—'))}</td><td class="py-2 pr-3 seg text-[#9aa0ab]">${(r.in||0).toLocaleString()}/${(r.out||0).toLocaleString()}</td><td class="py-2 seg font-semibold text-right">${usd(r.micros)}</td></tr>`).join(''):`<tr><td colspan="6" class="py-6 text-center text-[#9aa0ab]">No calls logged yet. Metering starts now and fills in as the AI tools get used.</td></tr>`;
  return `<section class="space-y-4">
    ${banner}
    <div class="card p-6">
      <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div><h2 class="font-display text-lg font-semibold">API costs</h2><p class="text-[11px] text-[#9aa0ab] mt-.5">Every AI call (Claude menu/InBody scans, Vee chat, plan generation) priced at provider rates. Metering is forward-only; figures begin when this was deployed.</p></div>
        <div class="flex items-center gap-2 text-xs">
          <label class="text-[#9aa0ab]">From</label><input id="bFrom" type="date" value="${dISO(B.from)}" class="border border-[#e6e9ee] rounded-lg px-2 py-1">
          <label class="text-[#9aa0ab]">To</label><input id="bTo" type="date" value="${dISO(B.to)}" class="border border-[#e6e9ee] rounded-lg px-2 py-1">
          <button id="billcsv" class="px-3 py-1.5 rounded-lg border border-[#e6e9ee] font-semibold hover:bg-[#f1f3f7]">⬇ CSV</button>
        </div>
      </div>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
        ${kpi(usd(B.total_micros),'total cost',`${B.calls||0} calls`)}
        ${kpi(provTotal('anthropic'),'Anthropic',prov.anthropic?`${prov.anthropic.calls} calls`:'0 calls')}
        ${kpi(provTotal('xai'),'xAI Grok',prov.xai?`${prov.xai.calls} calls`:'0 calls')}
        ${kpi((B.calls||0).toString(),'AI calls','this period')}
      </div>
    </div>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="card p-6">
        <h3 class="font-display font-semibold mb-3">By feature</h3>
        <div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-[10px] uppercase tracking-wide text-[#9aa0ab] text-left border-b border-[#eef0f4]"><th class="py-2 pr-3">Feature</th><th class="py-2 pr-3">Calls</th><th class="py-2 pr-3">In tok</th><th class="py-2 pr-3">Out tok</th><th class="py-2 text-right">Cost</th></tr></thead><tbody>${featRows}</tbody></table></div>
      </div>
      <div class="card p-6">
        <h3 class="font-display font-semibold mb-3">By user</h3>
        <div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-[10px] uppercase tracking-wide text-[#9aa0ab] text-left border-b border-[#eef0f4]"><th class="py-2 pr-3">User</th><th class="py-2 pr-3">Role</th><th class="py-2 pr-3">Calls</th><th class="py-2 text-right">Cost</th></tr></thead><tbody>${actRows}</tbody></table></div>
      </div>
    </div>
    <div class="card p-6">
      <h3 class="font-display font-semibold mb-3">Recent calls</h3>
      <div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-[10px] uppercase tracking-wide text-[#9aa0ab] text-left border-b border-[#eef0f4]"><th class="py-2 pr-3">When</th><th class="py-2 pr-3">Provider</th><th class="py-2 pr-3">Feature</th><th class="py-2 pr-3">User</th><th class="py-2 pr-3">In/Out tok</th><th class="py-2 text-right">Cost</th></tr></thead><tbody>${recRows}</tbody></table></div>
      <p class="text-[11px] text-[#9aa0ab] mt-3">Prices: Claude Sonnet 4.6 $3/$15 per million tokens (in/out); Grok 4.1 Fast $0.20/$0.50. Adjust in convex/usage.ts if rates change.</p>
    </div>
  </section>`;
}

  const lastRev=(DATA.audit||[]).find(a=>a.code==='V-001');

    <div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-[10px] uppercase tracking-wide text-[#9aa0ab] text-left border-b border-[#eef0f4]"><th class="py-2 pr-3">Vendor / tool</th><th class="py-2 pr-3">Category</th><th class="py-2 pr-3">Data</th><th class="py-2 pr-3">BAA</th><th class="py-2 pr-3">Risk</th><th class="py-2">Reviewed</th></tr></thead>

function render(){
  $('who').textContent=(DATA.me?DATA.me.email:'')+' · '+(DATA.me?DATA.me.role:'');
  // Providers (DeBry / NP) get their clinical work surface: the Task board (where paid
  // GLP-1 enrollments drop an Rx-review task, patient + medication revealed to providers)
  // plus the support ticket queue. No Systems/Access/Reporting/Billing/Vendor/Audit.
  const TABS = PROVIDER_MODE
    ? [['tasks','My queue'],['tickets','Tickets']]
    : [['systems','Systems'],['access','Access control'],['tasks','Tasks'],['tickets','Tickets'],['reports','Reporting'],['billing','Billing'],['vendors','Vendor risk'],['audit','Audit log']];
  const head = PROVIDER_MODE
    ? '<div><h1 class="font-display text-2xl font-semibold tracking-[-.5px]">Provider workspace</h1><p class="text-sm text-[#6b7280] mt-1">Your Rx review queue and support tickets.</p></div>'
    : '<div><h1 class="font-display text-2xl font-semibold tracking-[-.5px]">Operations</h1><p class="text-sm text-[#6b7280] mt-1">Access control, the task board, and the compliance audit trail.</p></div>';
  $('app').innerHTML=`
    ${head}
    <div class="flex gap-2 flex-wrap">
      ${TABS.map(([k,label])=>`<span class="tab ${TAB===k?'on':''}" data-t="${k}">${label}</span>`).join('')}
    </div>
    ${TAB==='systems'?viewSystems():TAB==='access'?viewAccess():TAB==='tasks'?viewTasks():TAB==='tickets'?viewTickets():TAB==='reports'?viewReports():TAB==='billing'?viewBilling():TAB==='vendors'?viewVendors():viewAudit()}`;
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{ TAB=t.dataset.t; render(); });
  if(TAB==='systems' && SYS){
    const rc=$('runChk'); if(rc) rc.onclick=async()=>{ rc.disabled=true; rc.textContent='Running…'; await sysApi({action:'run'}); SYS=await sysApi({action:'load'}); render(); };
  } else if(TAB==='access'){
    document.querySelectorAll('[data-role]').forEach(s=>s.onchange=async()=>{ await api({action:'set_role',id:s.dataset.role,role:s.value}); await reload(); });
    document.querySelectorAll('[data-active]').forEach(b=>b.onclick=async()=>{ const activate=b.dataset.to==='1'; let reason=null; if(!activate){ reason=prompt('Reason for deactivating access (e.g. Involuntary termination, Resigned, Leave of absence):',''); if(reason===null) return; } await api({action:'set_active',id:b.dataset.active,active:activate,reason}); await reload(); });
    $('addBtn').onclick=async()=>{ const n=$('nName').value.trim(); if(!n)return; await api({action:'add_staff',full_name:n,email:$('nEmail').value.trim(),role:$('nRole').value}); await reload(); };
    document.querySelectorAll('[data-invite]').forEach(b=>b.onclick=async()=>{ const o=b.textContent; b.disabled=true; b.textContent='Sending…'; try{ const r=await fetch(CONVEX_URL+'/onboard-invite',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+await getAuthToken()},body:JSON.stringify({email:b.dataset.invite})}); const j=await r.json(); b.textContent=j.ok?'✓ Sent':'Failed'; }catch(e){ b.textContent='Failed'; } setTimeout(()=>{ b.disabled=false; b.textContent=o; },2500); });
  } else if(TAB==='tasks' && TASKS){
    document.querySelectorAll('[data-move]').forEach(s=>s.onchange=async()=>{ await tasksApi({action:'update',id:s.dataset.move,status:s.value}); await loadTasks(); render(); });
    document.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{ await tasksApi({action:'delete',id:b.dataset.del}); await loadTasks(); render(); });
    const add=$('tAdd'); if(add) add.onclick=async()=>{ const t=$('tTitle').value.trim(); if(!t)return; await tasksApi({action:'create',title:t,assignee:$('tAssignee').value,priority:$('tPriority').value,due_date:$('tDue').value||null}); await loadTasks(); render(); };
  } else if(TAB==='tickets' && TICKETS){
    document.querySelectorAll('[data-tstatus]').forEach(s=>s.onchange=async()=>{ await ticketsApi({action:'update',id:s.dataset.tstatus,status:s.value}); await loadTickets(); render(); });
    const ta=$('tkAdd'); if(ta) ta.onclick=async()=>{ const sub=$('tkSub').value.trim(); if(!sub)return; ta.disabled=true; ta.textContent='Opening…'; await ticketsApi({action:'create',subject:sub,category:$('tkCat').value,body:$('tkBody').value.trim()}); await loadTickets(); render(); };
    const tc=$('tkcsv'); if(tc) tc.onclick=()=>{ const rows=[['subject','category','priority','status','requester','requester_type','sla_due','created','resolved']].concat((TICKETS.tickets||[]).map(t=>[t.subject,t.category,t.priority,t.status,(t.requester_name||t.requester_email),t.requester_type,t.sla_due_at?fmtTs(t.sla_due_at):'',t.created_at?fmtTs(t.created_at):'',t.resolved_at?fmtTs(t.resolved_at):''])); const csv=rows.map(r=>r.map(c=>`"${(c==null?'':String(c)).replace(/"/g,'""')}"`).join(',')).join('\n'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='vitality-tickets-'+new Date().toISOString().slice(0,10)+'.csv'; a.click(); };
  } else if(TAB==='reports' && REPORTS){
    const cc=$('callcsv'); if(cc) cc.onclick=()=>{ const rows=[['when','from','intent','outcome','seconds','transcript_ref','telnyx_call_id','review']].concat((REPORTS.calls||[]).map(c=>[c.ts,c.from,c.intent,c.outcome,c.dur,c.tref,c.telnyx,(!c.outcome||(c.dur!=null&&c.dur<5))?'flag':'ok'])); const csv=rows.map(r=>r.map(c=>`"${(c==null?'':String(c)).replace(/"/g,'""')}"`).join(',')).join('\n'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='vitality-calls-'+new Date().toISOString().slice(0,10)+'.csv'; a.click(); };
  } else if(TAB==='billing' && BILLING){
    const bf=$('bFrom'), bt=$('bTo');
    const apply=()=>{ if(bf&&bf.value) BILL_FROM=new Date(bf.value+'T00:00:00').getTime(); if(bt&&bt.value) BILL_TO=new Date(bt.value+'T23:59:59').getTime(); BILLING=null; render(); };
    if(bf) bf.onchange=apply; if(bt) bt.onchange=apply;
    const bc=$('billcsv'); if(bc) bc.onclick=()=>{ const rows=[['when','provider','feature','user','role','input_tokens','output_tokens','usd']].concat((BILLING.recent||[]).map(r=>[new Date(r.ts).toISOString(),r.provider,r.surface,(r.actor||''),r.role,r.in,r.out,(r.micros/1e6).toFixed(6)])); const csv=rows.map(r=>r.map(c=>`"${(c==null?'':String(c)).replace(/"/g,'""')}"`).join(',')).join('\n'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='vitality-api-billing-'+new Date().toISOString().slice(0,10)+'.csv'; a.click(); };
  } else if(TAB==='vendors'){
    const vr=$('vrev'); if(vr) vr.onclick=async()=>{ vr.disabled=true; vr.textContent='Logging…'; DATA=await api({action:'vendor_review'}); render(); };
    const vc=$('vcsv'); if(vc) vc.onclick=()=>{ const lastRev=(DATA.audit||[]).find(a=>a.code==='V-001'); const revStamp=lastRev?(fmtTs(lastRev.ts)+(lastRev.actor?' by '+lastRev.actor:'')):'never'; const rows=[['side','vendor','category','use','data_class','baa','risk','flag','mitigation','last_reviewed','note']].concat(VENDORS.map(v=>[v.side==='them'?'clinic':'ours',v.name,v.cat,v.use,v.data,v.baa,v.risk,vFlag(v)?'flag':'',v.mit,revStamp,v.note])); const csv=rows.map(r=>r.map(c=>`"${(c==null?'':String(c)).replace(/"/g,'""')}"`).join(',')).join('\n'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='vitality-vendor-risk-'+new Date().toISOString().slice(0,10)+'.csv'; a.click(); };
  } else if(TAB==='audit'){
    $('csv').onclick=()=>{ const rows=[['timestamp','code','action','by','entity','entity_id','hash','onchain_tx']].concat((DATA.audit||[]).map(r=>[r.ts,r.code,decode(r.code),r.actor,r.entity,r.entity_id,r.hash,r.tx||''])); const csv=rows.map(r=>r.map(c=>`"${(c==null?'':String(c)).replace(/"/g,'""')}"`).join(',')).join('\n'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='vitality-audit-'+new Date().toISOString().slice(0,10)+'.csv'; a.click(); };
  }
}
async function reload(){ DATA=await api({action:'load'}); render(); }

DATA = await api({action:'load'});
$('loading').classList.add('hidden');
if (DATA && DATA.ok){ $('app').classList.remove('hidden'); render(); }
else if (DATA && /admin only/i.test(DATA.error||'')){
  // Not a clinic admin — but providers/staff can still work the ticket queue.
  // The /tickets route allows any staff role; if it loads, drop into a Tickets-only view.
  await loadTickets();
  if (TICKETS && TICKETS.ok){
    PROVIDER_MODE=true; TAB='tasks';
    DATA={ ok:true, me:{ email:'', role:'provider' } };
    $('app').classList.remove('hidden'); render();
  } else {
    $('denied').classList.remove('hidden');
  }
}
else { $('loading').textContent='Could not load. Please try again.'; $('loading').classList.remove('hidden'); }
</script>
</body>
</html>
